<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motherboard — Logo Test</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Share Tech Mono', monospace;
  background: #060606;
  color: #00FF41;
  padding: 48px 40px 80px;
  min-height: 100vh;
}
h1 {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(0,255,65,0.4);
  margin-bottom: 48px;
}

/* ── GRID ── */
.logo-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 48px 40px;
}
.logo-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.logo-item-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(0,255,65,0.35);
}

/* ── ICON SHELL ── */
/* iOS home screen icon: square, rounded corners applied by OS (~22.5% radius) */
.icon {
  width: 120px;
  height: 120px;
  border-radius: 27px;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
}
.icon svg {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── PHONE PREVIEW ── */
.phone-section {
  margin-top: 72px;
}
.phone-section h2 {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(0,255,65,0.35);
  margin-bottom: 28px;
}
.phone-wrap {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  align-items: flex-start;
}
.phone {
  width: 240px;
  background: #111;
  border: 1.5px solid #222;
  border-radius: 36px;
  padding: 28px 16px 24px;
  position: relative;
  box-shadow: 0 16px 48px rgba(0,0,0,0.8);
}
.phone-notch {
  width: 70px;
  height: 10px;
  background: #0a0a0a;
  border: 1.5px solid #222;
  border-radius: 10px;
  margin: 0 auto 20px;
}
.phone-screen {
  border-radius: 16px;
  overflow: hidden;
  background: #0a0a0a;
  padding: 16px 8px;
}
.phone-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 12px;
}
.phone-icon-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.phone-icon {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
}
.phone-icon svg { display: block; width: 100%; height: 100%; }
.phone-icon-name {
  font-size: 7px;
  color: rgba(255,255,255,0.6);
  text-align: center;
  letter-spacing: 0.03em;
  max-width: 54px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* Placeholder app icons for context */
.placeholder-icon {
  width: 52px; height: 52px; border-radius: 12px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
}
</style>
</head>

            <circle cx="200" cy="700" r="36"/><circle cx="300" cy="700" r="36"/><circle cx="400" cy="700" r="36"/><circle cx="500" cy="700" r="36"/><circle cx="600" cy="700" r="36"/><circle cx="700" cy="700" r="36"/><circle cx="800" cy="700" r="36"/>
            <circle cx="200" cy="800" r="36"/><circle cx="300" cy="800" r="36"/><circle cx="400" cy="800" r="36"/><circle cx="500" cy="800" r="36"/><circle cx="600" cy="800" r="36"/><circle cx="700" cy="800" r="36"/><circle cx="800" cy="800" r="36"/>
          </g>
          <!-- M lit dots (7-wide M pattern): -->
          <g fill="#00FF41" opacity="1">
            <!-- row 1: 1 0 0 0 0 0 1 -->
            <circle cx="200" cy="200" r="36"/><circle cx="800" cy="200" r="36"/>
            <!-- row 2: 1 1 0 0 0 1 1 -->

            <!-- row 3: 1 0 1 0 1 0 1 -->

            <!-- row 4: 1 0 0 1 0 0 1 -->

            <!-- row 5: 1 0 0 0 0 0 1 -->
            <circle cx="200" cy="600" r="36"/><circle cx="800" cy="600" r="36"/>
            <!-- row 6: 1 0 0 0 0 0 1 -->
            <circle cx="200" cy="700" r="36"/><circle cx="800" cy="700" r="36"/>
            <!-- row 7: 1 0 0 0 0 0 1 -->
            <circle cx="200" cy="800" r="36"/><circle cx="800" cy="800" r="36"/>
          </g>
          <!-- accent dot in center -->

        </g>
