<script>
// ── SUPABASE ──
const _sb = window.supabaseClient;
let _uid = null;

// ── CONSTANTS ──
const HABIT_ICONS = [
  { s: '▷',  label: 'Run'        },
  { s: '◯',  label: 'Walk'       },
  { s: '◁',  label: 'Cycle'      },
  { s: '≋',  label: 'Swim'       },
  { s: '◈',  label: 'Workout'    },
  { s: '✦',  label: 'Yoga'       },
  { s: '◎',  label: 'Meditate'   },
  { s: '▽',  label: 'Drink Water'},
  { s: '△',  label: 'Eat Healthy'},
  { s: '▲',  label: 'Cook'       },
  { s: '◑',  label: 'Sleep'      },
  { s: '●',  label: 'Vitamins'   },
  { s: '⊘',  label: 'No Alcohol' },
  { s: '⊗',  label: 'No Sugar'   },
  { s: '▤',  label: 'Read'       },
  { s: '◇',  label: 'Study'      },
  { s: '♡',  label: 'Gratitude'  },
  { s: '▣',  label: 'Journal'    },
  { s: '◐',  label: 'Reflect'    },
  { s: '◆',  label: 'Strength'   },
  { s: '■',  label: 'Deep Work'  },
  { s: '◧',  label: 'Review'     },
  { s: '⊟',  label: 'No Phone'   },
  { s: '↑',  label: 'Early Rise' },
  { s: '↓',  label: 'Early Bed'  },
  { s: '⊕',  label: 'Connect'    },
  { s: '◬',  label: 'Nature'     },
  { s: '✱',  label: 'Mindful'    },
  { s: '◌',  label: 'Rest'       },
  { s: '▦',  label: 'Track'      },
  { s: '✲',  label: 'Breathe'    },
  { s: '◒',  label: 'Balance'    },
  { s: '⊞',  label: 'Routine'    },
  { s: '✳',  label: 'Sunlight'   },
  { s: '◉',  label: 'Goal'       },
];

const HABIT_COLORS = [
  '#00E676', // phosphor green
  '#FF6D00', // burnt orange
  '#00C8C8', // terminal cyan
  '#EE3333', // terminal red
  '#AA44EE', // phosphor purple
  '#EEC900', // amber
  '#3377DD', // terminal blue
  '#EE2288', // hot magenta
  '#00AAAA', // teal
  '#88CC00', // lime green
  '#CC5500', // rust / copper
  '#55AAEE', // ice blue
];
const SUCCESS_COLOR = '#6BCB77';
const FAIL_COLOR    = '#FF6B6B';
const EMPTY_COLOR   = 'var(--surface3)';

// ── STATE ──
let habits          = [];
let logs            = [];
let currentView     = 'today';
let selectedDate    = (() => { const _d = new Date(); return `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`; })();
let progressHabitId = 'all';
let openMenuId      = null;

let habitDirection  = 'building';
let selectedColor   = HABIT_COLORS[0];
let selectedIcon   = '▷';

const today    = new Date();
const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

// ── UTILS ──
function uid()           { return crypto.randomUUID(); }

function getLog(habitId, dateStr) {
  return logs.find(l => l.habit_id === habitId && l.date === dateStr);
}

function isSuccess(habit, log) {
  if (!log) return habit.habit_direction === 'breaking';
  if (habit.type === 'yes_no') {
    return habit.habit_direction === 'building' ? !!log.completed : !log.completed;
  }
  const val = log.value ?? 0;
  return habit.habit_direction === 'building'
    ? val >= (habit.target_value || 0)
    : val <= (habit.target_value || 0);
}

function successColor(habit, log) {
  const log2 = log || getLog(habit.id, selectedDate);
  return isSuccess(habit, log2) ? SUCCESS_COLOR : FAIL_COLOR;
}

function dirIcon(habit) {
  return habit.habit_direction === 'building'
    ? '<span class="dir-icon building" title="Building">↑</span>'
    : '<span class="dir-icon breaking" title="Breaking">↓</span>';
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDateLong(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric',
  });
}

function fmtDateShort(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', {
    month: 'short', day: 'numeric',
  });
}

// ── STREAK ──
function currentStreak(habit) {
  const createdDate = habit.created_at ? habit.created_at.split('T')[0] : null;
  let streak = 0, d = todayStr;
  for (let i = 0; i < 365; i++) {
    if (createdDate && d < createdDate) break;
    const log = getLog(habit.id, d);
    if (isSuccess(habit, log)) { streak++; d = addDays(d, -1); }
    else break;
  }
  return streak;
}

function longestStreak(habit) {
  const createdDate = habit.created_at ? habit.created_at.split('T')[0] : null;
  let best = 0, cur = 0;
  for (let i = 364; i >= 0; i--) {
    const d = addDays(todayStr, -i);
    if (createdDate && d < createdDate) { cur = 0; continue; }
    if (isSuccess(habit, getLog(habit.id, d))) { cur++; if (cur > best) best = cur; }
    else cur = 0;
  }
  return best;
}

function completionRate(habit, days = 30) {
  const createdDate = habit.created_at ? habit.created_at.split('T')[0] : null;
  let n = 0, counted = 0;
  for (let i = 0; i < days; i++) {
    const d = addDays(todayStr, -i);
    if (createdDate && d < createdDate) break;
    if (isSuccess(habit, getLog(habit.id, d))) n++;
    counted++;
  }
  if (!counted) return 0;
  return Math.round((n / counted) * 100);
}

// ── VIEW SWITCHER ──
function setView(view, el) {
  currentView = view;
  document.getElementById('view-today').style.display    = view === 'today'    ? '' : 'none';
  document.getElementById('view-progress').style.display = view === 'progress' ? '' : 'none';
  document.getElementById('view-quit').style.display     = view === 'quit'     ? '' : 'none';
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  if (view === 'today')    renderToday();
  if (view === 'progress') renderProgress();
  if (view === 'quit')     renderQuitView();
  closeMobileMenus();
}

// ── DATE NAVIGATION ──
function shiftDate(n) {
  selectedDate = addDays(selectedDate, n);
  renderToday();
}

function updateDateHeading() {
  const h = document.getElementById('today-heading');
  const s = document.getElementById('today-subheading');
  if (selectedDate === todayStr) {
    h.textContent = 'Today';
    s.textContent = fmtDateLong(todayStr);
  } else {
    const delta = Math.round((new Date(selectedDate+'T00:00:00') - new Date(todayStr+'T00:00:00')) / 86400000);
    h.textContent = delta === -1 ? 'Yesterday' : delta === 1 ? 'Tomorrow' : fmtDateLong(selectedDate);
    s.textContent = delta === -1 || delta === 1 ? fmtDateLong(selectedDate) : '';
  }
}

// ── TODAY RENDER ──
function renderToday() {
  updateDateHeading();
  const container = document.getElementById('habits-list');

  if (!habits.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">◎</div>
      <h3>No habits yet</h3>
      <p>Click <strong>+ New Habit</strong> to get started.</p>
    </div>`;
    return;
  }

  const active = habits.filter(h => {
    if (h.active === false) return false;
    if (h.created_at == null) return true;
    return h.created_at.slice(0, 10) <= selectedDate;
  });
  if (!active.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">◎</div><h3>No active habits</h3></div>`;
    return;
  }

  container.innerHTML = active.map(h => renderHabitRow(h)).join('');
}

function renderHabitRow(habit) {
  const log     = getLog(habit.id, selectedDate);
  const success = isSuccess(habit, log);
  const sClass  = log ? (success ? 'success' : 'fail') : 'empty';

  let inputHtml = '';
  if (habit.type === 'yes_no') {
    const isYes = log != null && log.completed === true;
    const isNo  = log != null && log.completed === false;
    const yStyle = isYes ? `background:${SUCCESS_COLOR};border-color:${SUCCESS_COLOR};color:#0f0f0f;` : '';
    const nStyle = isNo  ? `background:${FAIL_COLOR};border-color:${FAIL_COLOR};color:#0f0f0f;` : '';
    inputHtml = `<div class="habit-yn-btns">
      <button class="habit-yn-btn yn-yes" style="${yStyle}"
              onclick="logYesNo('${habit.id}', true, ${isYes})">✓</button>
      <button class="habit-yn-btn yn-no" style="${nStyle}"
              onclick="logYesNo('${habit.id}', false, ${isNo})">✗</button>
    </div>`;
  } else {
    const val = log ? (log.value ?? '') : '';
    const target = habit.target_value || 0;
    const pct = target > 0 && val !== '' ? Math.min(100, Math.round((parseFloat(val) / target) * 100)) : 0;
    const barColor = log ? (success ? SUCCESS_COLOR : FAIL_COLOR) : 'var(--border2)';
    inputHtml = `<div class="habit-numeric-wrap">
      <input type="number" class="habit-num-input" value="${val}" min="0"
             placeholder="0" onchange="logNumeric('${habit.id}', this.value)"
             style="${log && success ? `color:${SUCCESS_COLOR};` : log ? `color:${FAIL_COLOR};` : ''}">
      <span class="habit-target-label">/ ${target}${habit.unit ? ' ' + habit.unit : ''}</span>
      <div class="habit-progress-bar">
        <div class="habit-progress-fill" style="width:${pct}%;background:${barColor};"></div>
      </div>
    </div>`;
  }

  return `<div class="habit-row${log && success ? ' habit-done' : ''}" id="row-${habit.id}">
    <div class="habit-row-left">
      <div class="habit-menu-wrap">
        <button class="habit-menu-btn" onclick="toggleHabitMenu(event,'${habit.id}')">⋯</button>
        <div class="habit-menu-dropdown" id="menu-${habit.id}">
          <div class="habit-menu-option" onclick="openEditHabit('${habit.id}')">Edit</div>
          <div class="habit-menu-option danger" onclick="confirmDeleteHabitById('${habit.id}')">Delete</div>
        </div>
      </div>
      <span class="habit-emoji">${habit.emoji || '◎'}</span>
      <div class="habit-info">
        <span class="habit-name">${habit.name}</span>
        ${dirIcon(habit)}
      </div>
    </div>
    <div class="habit-row-right">
      ${inputHtml}
    </div>
  </div>`;
}

// ── LOGGING ──
async function logYesNo(habitId, completed, wasActive) {
  const habit = habits.find(h => h.id === habitId);
  if (habit && habit.created_at && selectedDate < habit.created_at.slice(0, 10)) return;

  const existing = getLog(habitId, selectedDate);

  if (wasActive) {
    // Deselect: update local state and re-render immediately, then sync DB
    const existingId = existing ? existing.id : null;
    if (existing) logs = logs.filter(l => l.id !== existing.id);
    renderToday();
    if (existingId) await _sb.from('habit_logs').delete().eq('id', existingId).eq('user_id', _uid);
    return;
  }

  if (existing) {
    // Update local state first, re-render, then sync DB
    Object.assign(existing, { habit_id: habitId, date: selectedDate, completed, value: null });
    renderToday();
    await _sb.from('habit_logs').update({ completed, value: null })
      .eq('id', existing.id).eq('user_id', _uid);
  } else {
    const newLog = { id: uid(), user_id: _uid, habit_id: habitId, date: selectedDate, completed, value: null, note: null };
    logs.push(newLog);
    renderToday();
    await _sb.from('habit_logs').insert(newLog);
  }
}

async function logNumeric(habitId, rawVal) {
  const habit = habits.find(h => h.id === habitId);
  if (habit && habit.created_at && selectedDate < habit.created_at.split('T')[0]) return;
  const value = rawVal === '' ? null : parseFloat(rawVal);
  const existing = getLog(habitId, selectedDate);
  const data = { habit_id: habitId, date: selectedDate, completed: value !== null, value, note: null };

  if (existing) {
    Object.assign(existing, data);
    await _sb.from('habit_logs').update({ completed: value !== null, value })
      .eq('id', existing.id).eq('user_id', _uid);
  } else {
    if (value === null) return;
    const newLog = { id: uid(), user_id: _uid, ...data };
    logs.push(newLog);
    await _sb.from('habit_logs').insert(newLog);
  }
  renderToday();
}

            <div class="all-habit-stat-label">30-day rate</div>
          </div>

            <div class="all-habit-stat-value">${streak}</div>
            <div class="all-habit-stat-label">day streak</div>
          </div>
        </div>

// ── ALL-HABITS LINE GRAPH ──
function renderAllHabitsLineGraph(displayHabits) {
  const W = 700, H = 200;
  const pad = { top: 20, right: 12, bottom: 32, left: 36 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  // X-axis: earliest creation date (capped at 30 days ago) → today
  const capStart = addDays(todayStr, -29);
  let startDate = todayStr;
  displayHabits.forEach(h => {
    const cd = h.created_at ? h.created_at.slice(0, 10) : capStart;
    const eff = cd < capStart ? capStart : cd;
    if (eff < startDate) startDate = eff;
  });

  // Build ordered list of days on the x-axis
  const dayList = [];
  for (let d = startDate; d <= todayStr; d = addDays(d, 1)) dayList.push(d);
  const totalDays = dayList.length;

  const habitData = displayHabits.map(habit => {
    const cd = habit.created_at ? habit.created_at.slice(0, 10) : null;
    const habitStart = cd && cd > capStart ? cd : capStart;
    const points = dayList.map((d, i) => {
      if (d < habitStart) return { d, i, avg: null };
      let sum = 0, count = 0;
      for (let j = 6; j >= 0; j--) {
        const rd = addDays(d, -j);
        if (rd < habitStart) continue;
        sum += isSuccess(habit, getLog(habit.id, rd)) ? 1 : 0;
        count++;
      }
      return { d, i, avg: count > 0 ? sum / count : null };
    });
    return { habit, points };
  });

  let paths = '';
  habitData.forEach(({ habit, points }) => {
    const color = habit.color || SUCCESS_COLOR;
    let pathStr = '', inPath = false;
    points.forEach(pt => {
      if (pt.avg === null) { inPath = false; return; }
      const x = pad.left + (totalDays > 1 ? (pt.i / (totalDays - 1)) : 0) * cW;
      const y = pad.top + cH - pt.avg * cH;
      pathStr += inPath
        ? `L ${x.toFixed(1)} ${y.toFixed(1)} `
        : `M ${x.toFixed(1)} ${y.toFixed(1)} `;
      inPath = true;
    });
    if (pathStr) {
      paths += `<path data-ll="${habit.id}" d="${pathStr.trim()}" stroke="${color}" stroke-width="2" fill="none" opacity="0.85" style="transition:opacity 0.2s;"/>`;
    }
  });

  let grid = '';
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * cH;
    const label = (100 - i * 25) + '%';
    grid += `<text x="${pad.left - 4}" y="${(y + 4).toFixed(1)}" font-size="9" fill="var(--text-muted)" font-family="var(--font-sans)" text-anchor="end">${label}</text>`;
    grid += `<line x1="${pad.left}" y1="${y.toFixed(1)}" x2="${pad.left + cW}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;
  }

  const labelStep = totalDays <= 10 ? 2 : totalDays <= 20 ? 4 : 7;
  let xLabels = '';
  dayList.forEach((d, i) => {
    if (i % labelStep !== 0 && i !== totalDays - 1) return;
    const x = pad.left + (totalDays > 1 ? (i / (totalDays - 1)) : 0) * cW;
    xLabels += `<text x="${x.toFixed(1)}" y="${H - 4}" font-size="9" fill="var(--text-muted)" font-family="var(--font-sans)">${fmtDateShort(d)}</text>`;
  });

  const legendHtml = displayHabits.map(h =>
    `<button class="line-legend-btn" id="ll-btn-${h.id}"
             style="--ll-color:${h.color || SUCCESS_COLOR};"
             onclick="toggleLineHabit('${h.id}')">${h.emoji ? h.emoji + '\u2009' : ''}${h.name}</button>`
  ).join('');

  return `<div class="progress-section-label" style="margin-top:32px;">Completion trend (7-day rolling average)</div>
  <div class="chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible;">
      ${grid}${paths}${xLabels}
    </svg>
    <div class="line-chart-legend">${legendHtml}</div>
  </div>`;
}

function toggleLineHabit(id) {
  const pathEls = document.querySelectorAll(`[data-ll="${id}"]`);
  const btn = document.getElementById('ll-btn-' + id);
  if (!pathEls.length) return;
  const hidden = pathEls[0].style.opacity === '0';
  pathEls.forEach(p => p.style.opacity = hidden ? '0.85' : '0');
  if (btn) btn.classList.toggle('inactive', !hidden);
}

// ── HEATMAP ──
function renderHeatmap(habit) {
  const createdDate = habit.created_at ? habit.created_at.split('T')[0] : null;
  const hColor = habit.color || SUCCESS_COLOR;
  const cells = [];
  for (let i = 364; i >= 0; i--) {
    const d   = addDays(todayStr, -i);
    const beforeCreation = !!(createdDate && d < createdDate);
    const log = beforeCreation ? null : getLog(habit.id, d);
    const suc = beforeCreation ? false : isSuccess(habit, log);
    const hasLog = !beforeCreation && !!log;
    cells.push({ d, suc, hasLog, beforeCreation });
  }

  const firstDay = new Date(cells[0].d + 'T00:00:00').getDay();
  const padded = Array(firstDay).fill(null).concat(cells);

  const weeks = [];
  for (let i = 0; i < padded.length; i += 7) {
    weeks.push(padded.slice(i, i + 7));
  }

  const monthLabels = [];
  let lastMonth = -1;
  weeks.forEach((week, wi) => {
    const firstReal = week.find(c => c !== null);
    if (firstReal) {
      const m = new Date(firstReal.d + 'T00:00:00').getMonth();
      if (m !== lastMonth) {
        monthLabels.push({ wi, label: new Date(firstReal.d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short' }) });
        lastMonth = m;
      }
    }
  });

  const dayLabels = ['','Mon','','Wed','','Fri',''];

  let weeksHtml = weeks.map(week => {
    const cellsHtml = week.map(cell => {
      if (!cell) return `<div class="hm-cell hm-empty"></div>`;
      let bg, opacity, title;
      if (cell.beforeCreation) {
        bg = 'var(--surface2)';
        opacity = '0.25';
        title = `${cell.d}: Before tracking started`;
      } else if (!cell.hasLog && habit.habit_direction !== 'breaking') {
        bg = 'var(--surface3)';
        opacity = '0.18';
        title = `${cell.d}: Not logged`;
      } else {
        bg = cell.suc ? hColor : FAIL_COLOR;
        opacity = '1';
        title = `${cell.d}: ${cell.suc ? 'On track' : 'Missed'}`;
      }
      return `<div class="hm-cell" style="background:${bg};opacity:${opacity};" title="${title}"></div>`;
    }).join('');
    return `<div class="hm-week">${cellsHtml}</div>`;
  }).join('');

  const monthRow = `<div class="hm-months">${
    weeks.map((_, wi) => {
      const lbl = monthLabels.find(m => m.wi === wi);
      return `<div class="hm-month-label">${lbl ? lbl.label : ''}</div>`;
    }).join('')
  }</div>`;

  const dayRow = `<div class="hm-days">${dayLabels.map(l => `<div class="hm-day-label">${l}</div>`).join('')}</div>`;

  return `<div class="heatmap-wrap">
    ${monthRow}
    <div class="heatmap-inner">
      ${dayRow}
      <div class="heatmap-weeks">${weeksHtml}</div>
    </div>
    <div class="heatmap-legend">
      <span style="color:var(--text-muted);font-size:11px;">Less</span>
      <div class="hm-cell" style="background:var(--surface3);"></div>
      <div class="hm-cell" style="background:${hColor};opacity:0.35;"></div>
      <div class="hm-cell" style="background:${hColor};opacity:0.65;"></div>
      <div class="hm-cell" style="background:${hColor};"></div>
      <span style="color:var(--text-muted);font-size:11px;">More</span>
    </div>
  </div>`;
}

function renderMiniHeatmap(habit) {
  const createdDate = habit.created_at ? habit.created_at.split('T')[0] : null;
  const hColor = habit.color || SUCCESS_COLOR;
  const cells = [];
  for (let i = 83; i >= 0; i--) {
    const d = addDays(todayStr, -i);
    if (createdDate && d < createdDate) { cells.push('var(--surface2)'); continue; }
    const log = getLog(habit.id, d);
    const suc = isSuccess(habit, log);
    cells.push(suc ? hColor : (habit.habit_direction === 'breaking' ? FAIL_COLOR : 'var(--surface3)'));
  }
  return cells.map(c => `<div class="mini-hm-cell" style="background:${c};"></div>`).join('');
}

// ── CHART ──
function renderChart(habit) {
  const days = 30;
  const createdDate = habit.created_at ? habit.created_at.split('T')[0] : null;
  const hColor = habit.color || SUCCESS_COLOR;
  const data = [];
  for (let i = days - 1; i >= 0; i--) {
    const d   = addDays(todayStr, -i);
    const beforeCreation = !!(createdDate && d < createdDate);
    const log = beforeCreation ? null : getLog(habit.id, d);
    data.push({ d, log, suc: beforeCreation ? false : isSuccess(habit, log), beforeCreation });
  }

  const W = 700, H = 180;
  const pad = { top: 16, right: 12, bottom: 28, left: 32 };
  const cW  = W - pad.left - pad.right;
  const cH  = H - pad.top  - pad.bottom;
  const bW  = Math.max(6, (cW / days) - 2);

  let maxVal = 1;
  if (habit.type === 'numeric') {
    maxVal = Math.max(
      habit.target_value || 1,
      ...data.map(d => d.log?.value || 0),
      1,
    );
    maxVal = maxVal * 1.2;
  }

  let bars = '', targetLine = '', xLabels = '';

  data.forEach((row, i) => {
    const x = pad.left + (i / days) * cW;
    let h, y;

    if (habit.type === 'yes_no') {
      h = row.suc ? cH : (row.log ? 4 : 2);
    } else {
      const val = row.log?.value || 0;
      h = Math.max(2, (val / maxVal) * cH);
    }
    y = pad.top + cH - h;
    const fill = row.beforeCreation ? 'var(--surface3)' : (row.suc ? hColor : FAIL_COLOR);
    const op   = row.beforeCreation ? '0.3' : (!row.log && habit.type === 'yes_no' && habit.habit_direction === 'building' ? '0.15' : '0.85');
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW}" height="${Math.max(2,h).toFixed(1)}" fill="${fill}" opacity="${op}" rx="2"/>`;
  });

  if (habit.type === 'numeric' && habit.target_value) {
    const ty = pad.top + cH - (habit.target_value / maxVal) * cH;
    targetLine = `<line x1="${pad.left}" y1="${ty.toFixed(1)}" x2="${pad.left + cW}" y2="${ty.toFixed(1)}" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
    <text x="${pad.left + cW + 2}" y="${(ty + 3).toFixed(1)}" font-size="9" fill="var(--text-muted)" font-family="var(--font-sans)">${habit.target_value}</text>`;
  }

  for (let i = 0; i < days; i += 5) {
    const x = pad.left + (i / days) * cW;
    xLabels += `<text x="${x.toFixed(1)}" y="${H - 4}" font-size="9" fill="var(--text-muted)" font-family="var(--font-sans)">${fmtDateShort(data[i].d)}</text>`;
  }

  let yAxis = '';
  const steps = 4;
  for (let i = 0; i <= steps; i++) {
    const v = habit.type === 'numeric' ? Math.round((maxVal / steps) * i) : (i === steps ? '✓' : '');
    const y = pad.top + cH - (i / steps) * cH;
    yAxis += `<text x="${pad.left - 4}" y="${(y + 3).toFixed(1)}" font-size="9" fill="var(--text-muted)" font-family="var(--font-sans)" text-anchor="end">${v}</text>`;
    yAxis += `<line x1="${pad.left}" y1="${y.toFixed(1)}" x2="${pad.left + cW}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;
  }

  return `<div class="chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible;">
      ${yAxis}
      ${bars}
      ${targetLine}
      ${xLabels}
    </svg>
    ${habit.type === 'numeric' && habit.target_value

async function saveHabit() {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) {
    document.getElementById('habit-name-input').style.borderColor = 'var(--p-high)';
    return;
  }

  const type       = document.getElementById('habit-type-input').value;
  const target     = type === 'numeric' ? parseFloat(document.getElementById('habit-target-input').value) || null : null;
  const unit       = type === 'numeric' ? document.getElementById('habit-unit-input').value.trim() : null;
  const eid        = document.getElementById('editing-habit-id').value;

  const data = {
    name, type, habit_direction: habitDirection,
    target_value: target, unit: unit || null,
    emoji: selectedIcon, color: selectedColor, active: true,
  };

  closeModal('habit-modal');

  if (eid) {
    const h = habits.find(x => x.id === eid);
    if (h) Object.assign(h, data);
    await _sb.from('habits').update(data).eq('id', eid).eq('user_id', _uid);
  } else {
    const newId = uid();
    habits.push({ id: newId, user_id: _uid, ...data });
    await _sb.from('habits').insert({ id: newId, user_id: _uid, ...data });
  }

  if (currentView === 'today')    renderToday();
  if (currentView === 'progress') renderProgress();
}

// ── QUIT TRACKER ──────────────────────────────────────────────────────────────

let quitTrackers = [];
let quitEvents   = {}; // tracker_id → events[] sorted desc
let _quitDetailId = null;

async function loadQuitData() {
  const [tr, ev] = await Promise.all([
    _sb.from('quit_trackers').select('*').eq('user_id', _uid).order('created_at'),
    _sb.from('quit_events').select('*').eq('user_id', _uid).order('occurred_at', { ascending: false }),
  ]);
  quitTrackers = tr.data || [];
  quitEvents   = {};
  for (const t of quitTrackers) quitEvents[t.id] = [];
  for (const e of (ev.data || [])) {
    if (quitEvents[e.tracker_id]) quitEvents[e.tracker_id].push(e);
  }
}

function fmtDuration(ms) {
  if (ms < 0) ms = 0;
  const totalHours = Math.floor(ms / 3600000);
  const days  = Math.floor(totalHours / 24);
  const hours = totalHours % 24;
  if (days > 0) return days + 'd ' + hours + 'h';
  return hours + 'h';
}

function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function fmtDateShort(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function quitCurrentMs(tracker) {
  const events = quitEvents[tracker.id] || [];
  const since  = events.length ? new Date(events[0].occurred_at) : new Date(tracker.started_at);
  return Date.now() - since.getTime();
}

function quitLongestMs(tracker) {
  const events = (quitEvents[tracker.id] || [])
    .slice()
    .sort((a, b) => new Date(a.occurred_at) - new Date(b.occurred_at));
  let longest = 0;
  let prev    = new Date(tracker.started_at).getTime();
  for (const e of events) {
    const dur = new Date(e.occurred_at).getTime() - prev;
    if (dur > longest) longest = dur;
    prev = new Date(e.occurred_at).getTime();
  }
  const current = Date.now() - prev;
  if (current > longest) longest = current;
  return longest;
}

function quitLongestPeriod(tracker) {
  const events = (quitEvents[tracker.id] || [])
    .slice()
    .sort((a, b) => new Date(a.occurred_at) - new Date(b.occurred_at));
  let longest = 0, bestStart = new Date(tracker.started_at), bestEnd = new Date();
  let prev = new Date(tracker.started_at);
  const check = (start, end) => {
    const dur = end - start;
    if (dur > longest) { longest = dur; bestStart = start; bestEnd = end; }
  };
  for (const e of events) { check(prev, new Date(e.occurred_at)); prev = new Date(e.occurred_at); }
  check(prev, new Date());
  return { start: bestStart, end: bestEnd };
}

function renderQuitView() {
  const el = document.getElementById('quit-grid');
  if (!quitTrackers.length) {
    el.innerHTML = '<div class="detail-empty-logs" style="margin-top:40px;">No quit trackers yet. Hit + New to start one.</div>';
    return;
  }
  el.innerHTML = quitTrackers.map(t => {
    const currentMs  = quitCurrentMs(t);
    const longestMs  = quitLongestMs(t);
    const events     = quitEvents[t.id] || [];
    const sinceDate  = events.length ? events[0].occurred_at : t.started_at;
    const slipCount  = events.length;
    return `<div class="quit-card" onclick="openQuitDetail('${t.id}')">
      <div class="quit-card-name">${esc(t.name)}</div>
      <div class="quit-elapsed">${fmtDuration(currentMs)}</div>
      <div class="quit-since">clean since ${fmtDateShort(sinceDate)}</div>
      <div class="quit-meta">
        <span>Longest: <strong>${fmtDuration(longestMs)}</strong></span>
        <span>${slipCount} slip${slipCount !== 1 ? 's' : ''}</span>
      </div>
      <button class="quit-slip-btn" onclick="event.stopPropagation(); openSlipModal('${t.id}')">I Slipped</button>
    </div>`;
  }).join('');
}

function openQuitDetail(id) {
  _quitDetailId = id;
  const t      = quitTrackers.find(x => x.id === id);
  const events = quitEvents[id] || [];
  const { start, end } = quitLongestPeriod(t);
  const sinceDate = events.length ? events[0].occurred_at : t.started_at;

  document.getElementById('quit-detail-title').textContent   = t.name;
  document.getElementById('quit-detail-current').textContent = fmtDuration(quitCurrentMs(t));
  document.getElementById('quit-detail-since').textContent   = 'since ' + fmtDateShort(sinceDate);
  document.getElementById('quit-detail-longest').textContent = fmtDuration(quitLongestMs(t));
  document.getElementById('quit-detail-longest-dates').textContent =
    fmtDateShort(start) + ' – ' + fmtDateShort(end);
  document.getElementById('quit-detail-slip-count').textContent =
    events.length ? events.length + ' total slip' + (events.length !== 1 ? 's' : '') : 'No slips yet';

  const logEl = document.getElementById('quit-detail-log');
  logEl.innerHTML = events.length
    ? events.map(e => `<div class="quit-log-entry">
        <span class="quit-log-date">${fmtDateTime(e.occurred_at)}</span>
        <span class="quit-log-note dim">${e.note ? esc(e.note) : '—'}</span>
      </div>`).join('')
    : '<div class="dim" style="padding:16px 0;font-size:13px;">No slips logged yet.</div>';

  document.getElementById('quit-detail-modal').classList.add('show');
}

function openSlipFromDetail() {
  closeModal('quit-detail-modal');
  openSlipModal(_quitDetailId);
}

function openSlipModal(id) {
  const t = quitTrackers.find(x => x.id === id);
  document.getElementById('quit-slip-tracker-id').value   = id;
  document.getElementById('quit-slip-title').textContent  = 'Log a Slip — ' + t.name;
  document.getElementById('quit-slip-note-input').value    = '';
  document.getElementById('quit-slip-time-input').value   = '';
  document.getElementById('quit-slip-select').value       = 'now';
  document.getElementById('quit-slip-time-input').style.display = 'none';
  document.getElementById('quit-slip-modal').classList.add('show');
}

async function saveSlip() {
  const trackerId = document.getElementById('quit-slip-tracker-id').value;
  const mode = document.getElementById('quit-slip-select').value;
  let occurred_at;
  if (mode === 'now') {
    occurred_at = new Date().toISOString();
  } else {
    const val = document.getElementById('quit-slip-time-input').value;
    if (!val) { alert('Please enter a date and time.'); return; }
    occurred_at = new Date(val).toISOString();
  }
  const note = document.getElementById('quit-slip-note-input').value.trim() || null;
  const { error } = await _sb.from('quit_events').insert({
    id: crypto.randomUUID(), tracker_id: trackerId, user_id: _uid, occurred_at, note,
  });
  if (error) { console.error(error); alert('Error saving slip.'); return; }
  closeModal('quit-slip-modal');
  await loadQuitData();
  renderQuitView();
}

function openNewQuitTracker() {
  document.getElementById('quit-name-input').value    = '';
  document.getElementById('quit-since-input').value  = '';
  document.getElementById('quit-since-select').value = 'now';
  document.getElementById('quit-since-input').style.display = 'none';
  document.getElementById('quit-new-modal').classList.add('show');
}

async function saveQuitTracker() {
  const name = document.getElementById('quit-name-input').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const mode = document.getElementById('quit-since-select').value;
  let started_at;
  if (mode === 'now') {
    started_at = new Date().toISOString();
  } else {
    const val = document.getElementById('quit-since-input').value;
    if (!val) { alert('Please enter a start date.'); return; }
    started_at = new Date(val).toISOString();
  }
  const { error } = await _sb.from('quit_trackers').insert({
    id: crypto.randomUUID(), user_id: _uid, name, started_at,
  });
  if (error) { console.error(error); alert('Error saving tracker.'); return; }
  closeModal('quit-new-modal');
  await loadQuitData();
  renderQuitView();
}

function confirmDeleteQuit() {
  const t = quitTrackers.find(x => x.id === _quitDetailId);
  if (!t) return;
  document.getElementById('confirm-delete-msg').textContent =
    'Delete "' + t.name + '" and all its slip history? This cannot be undone.';
  document.getElementById('confirm-delete-btn').onclick = async () => {
    await _sb.from('quit_trackers').delete().eq('id', _quitDetailId);
    closeModal('confirm-delete-modal');
    closeModal('quit-detail-modal');
    await loadQuitData();
    renderQuitView();
  };
  closeModal('quit-detail-modal');
  document.getElementById('confirm-delete-modal').classList.add('show');
}


function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
