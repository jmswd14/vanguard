// ── INIT ─────────────────────────────────────────────────────────────────────

async function checkAndGenerateNotifications() {
  if (!currentUser) return;

  // Load enabled notification settings for this user
  const { data: settings } = await DB
    .from('user_notification_settings')
    .select('type, enabled')
    .eq('user_id', currentUser.id);

  if (!settings || settings.length === 0) return;

  const enabledTypes = new Set(settings.filter(s => s.enabled).map(s => s.type));
  if (enabledTypes.size === 0) return;

  // Dedup via localStorage — persists even if user clears notifications from the panel
  const lsKey = 'vg-notif-gen';
  function getGeneratedToday() {
    try {
      const s = JSON.parse(localStorage.getItem(lsKey) || '{}');
      return s.date === todayStr ? new Set(s.types || []) : new Set();
    } catch { return new Set(); }
  }
  function markGeneratedToday(type) {
    try {
      const s = JSON.parse(localStorage.getItem(lsKey) || '{}');
      const types = s.date === todayStr ? (s.types || []) : [];
      if (!types.includes(type)) types.push(type);
      localStorage.setItem(lsKey, JSON.stringify({ date: todayStr, types }));
    } catch {}
  }

  const alreadySentToday = getGeneratedToday();

  // Insert a notification row directly, then fire Edge Function for email (best-effort)
  async function notify({ type, title, message, link, items, emailBody }) {
    const { error } = await DB.from('notifications').insert({
      user_id: currentUser.id,
      type,
      title,
      message: message || '',
      read: false,
      link: link || null,
    });
    if (error) { console.error('[notifications] insert failed:', error); return; }
    markGeneratedToday(type);

    // Email via Edge Function — fire-and-forget, never blocks in-app
    DB.functions.invoke('send-notification', { body: {
      to: currentUser.email,
      subject: title,
      body: emailBody || message || title,
      user_id: currentUser.id,
      type,
      link: link || null,
      items: items || null,
      display_name: currentUser.user_metadata?.display_name || '',
    }}).then(({ error }) => {
      if (error) console.error('[notifications] email invoke error:', error);
      else console.log('[notifications] email sent for type:', type);
    }).catch(e => console.error('[notifications] email invoke threw:', e));
  }

  let inserted = 0;

  // ── task_due_today ──────────────────────────────────────────────────────────
  if (enabledTypes.has('task_due_today') && !alreadySentToday.has('task_due_today')) {
    const { data: dueTasks } = await DB
      .from('tasks').select('name')
      .eq('user_id', currentUser.id).eq('due', todayStr).eq('done', false).limit(10);
    if (dueTasks && dueTasks.length > 0) {
      const names = dueTasks.map(t => t.name);
      await notify({
        type: 'task_due_today',
        title: `${names.length} task${names.length > 1 ? 's' : ''} due today`,
        message: names.join(', '),
        emailBody: 'You have tasks due today:',
        link: 'tasks/index.html',
        items: names,
      });
      inserted++;
    }
  }

  // ── task_overdue ────────────────────────────────────────────────────────────
  if (enabledTypes.has('task_overdue') && !alreadySentToday.has('task_overdue')) {
    const { data: overdueTasks } = await DB
      .from('tasks').select('name')
      .eq('user_id', currentUser.id).lt('due', todayStr).eq('done', false).limit(10);
    if (overdueTasks && overdueTasks.length > 0) {
      const names = overdueTasks.map(t => t.name);
      await notify({
        type: 'task_overdue',
        title: `${names.length} overdue task${names.length > 1 ? 's' : ''}`,
        message: names.join(', '),
        emailBody: 'These tasks are overdue:',
        link: 'tasks/index.html',
        items: names,
      });
      inserted++;
    }
  }

  // ── habit_checkin ───────────────────────────────────────────────────────────
  if (enabledTypes.has('habit_checkin') && !alreadySentToday.has('habit_checkin')) {
    const { data: habits } = await DB
      .from('habits').select('id, name')
      .eq('user_id', currentUser.id).eq('active', true).limit(50);
    if (habits && habits.length > 0) {
      const { data: completedLogs } = await DB
        .from('habit_logs').select('habit_id')
        .eq('date', todayStr).eq('completed', true)
        .in('habit_id', habits.map(h => h.id));
      const completedIds = new Set((completedLogs || []).map(l => l.habit_id));
      const pending = habits.filter(h => !completedIds.has(h.id)).slice(0, 10);
      if (pending.length > 0) {
        const names = pending.map(h => h.name);
        await notify({
          type: 'habit_checkin',
          title: `${names.length} habit${names.length > 1 ? 's' : ''} to check in`,
          message: names.join(', '),
          emailBody: 'Time to check in on your habits:',
          link: 'habits/index.html',
          items: names,
        });
        inserted++;
      }
    }
  }

  // ── journal_prompt ──────────────────────────────────────────────────────────
  if (enabledTypes.has('journal_prompt') && !alreadySentToday.has('journal_prompt')) {
    await notify({
      type: 'journal_prompt',
      title: 'Your journal is waiting',
      message: 'Take a few minutes to reflect.',
      emailBody: 'Your journal is waiting for you. Take a few minutes to reflect.',
      link: 'journal/index.html',
    });
    inserted++;
  }

  // Refresh bell badge if we wrote anything
  if (inserted > 0) window.refreshNotifBadge?.();
}

async function init() {
  const { data: { session } } = await DB.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;
  VG_THEME.sync();

  const today = new Date();
  todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('dash-date').textContent = dateStr;

  await loadSlots();
  await Promise.all([loadLayout(), loadDashLists(), loadDashTags(), fetchGreetings()]);
  renderGrid();
  loadAllWidgetData();
  renderSlotSidebar();

  clockInterval = setInterval(() => {
    updateGreetingClocks();
    // detect midnight rollover — refresh todayStr and reload widgets
    const newDate = (() => { const _d = new Date(); return `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`; })();
    if (newDate !== todayStr) {
      todayStr = newDate;
      document.getElementById('dash-date').textContent =
        new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      loadAllWidgetData();
    }
  }, 30000);
  checkAndGenerateNotifications(); // fire-and-forget; don't block dashboard load
}

// ── LAYOUT PERSISTENCE ────────────────────────────────────────────────────────

async function loadLayout() {
  const slot = dashboardSlots.find(s => s.slot_index === activeSlotIndex);
  if (slot && slot.id) {
    // slot exists in DB — use it even if empty (respects intentional empty state)
    widgets = Array.isArray(slot.widgets)
      ? slot.widgets.map(w => ({ ...w, user_id: currentUser.id }))
      : [];
    widgets.forEach((w, i) => { w.position = i; });
    return;
  }
  // Migration: load from legacy dashboard_widgets table if slots are empty
  try {
    const { data, error } = await DB.from('dashboard_widgets').select('*').order('position');
    if (!error && data && data.length > 0) {
      widgets = data;
      _persistSlot(0, widgets); // migrate to slot 0
      return;
    }
  } catch(e) {}
  // Default layout
  widgets = DEFAULT_LAYOUT.map(w => ({
    ...w,
    id: crypto.randomUUID(),
    user_id: currentUser.id,
  }));
}

async function saveLayout() {
  await _persistSlot(activeSlotIndex, widgets);
}

function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveLayout(), 1500);
}

// ── GRID RENDER ───────────────────────────────────────────────────────────────

function renderGrid() {
  const grid = document.getElementById('widget-grid');
  grid.innerHTML = '';
  if (editMode) grid.classList.add('edit-mode');
  else grid.classList.remove('edit-mode');

  widgets.forEach((w, idx) => {
    grid.appendChild(createWidgetEl(w, idx));
  });
}

function createWidgetEl(widget, idx) {
  const div = document.createElement('div');
  div.className = `widget size-${widget.size}`;
  div.dataset.id = widget.id;
  div.dataset.idx = String(idx);
  div.draggable = editMode;

  div.innerHTML = `
    <div class="widget-header">
      <span class="widget-drag-handle" title="Drag to reorder">⠿</span>
      <span class="widget-label">${esc(WIDGET_LABELS[widget.widget_type] || widget.widget_type)}</span>
      <button class="widget-options-btn" onclick="openWidgetOptions('${widget.id}')" title="Widget options">⚙</button>
      <button class="widget-remove" onclick="removeWidget('${widget.id}')" title="Remove">✕</button>
    </div>
    <div class="widget-body" id="wb-${widget.id}">
      <div class="widget-empty"><div class="widget-empty-icon">◌</div><div class="widget-empty-text">Loading</div></div>
    </div>
  `;

  div.addEventListener('dragstart', e => {
    if (!editMode) { e.preventDefault(); return; }
    dragSrcIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => { div.style.opacity = '0.45'; }, 0);
  });
  div.addEventListener('dragend', () => {
    div.style.opacity = '';
    document.querySelectorAll('.widget.drag-over').forEach(el => el.classList.remove('drag-over'));
  });
  div.addEventListener('dragenter', e => { e.preventDefault(); div.classList.add('drag-over'); });
  div.addEventListener('dragleave', () => { div.classList.remove('drag-over'); });
  div.addEventListener('dragover', e => { e.preventDefault(); });
  div.addEventListener('drop', e => {
    e.preventDefault();
    div.classList.remove('drag-over');
    const dropIdx = parseInt(div.dataset.idx);
    if (dragSrcIdx === null || dragSrcIdx === dropIdx) return;
    const moved = widgets.splice(dragSrcIdx, 1)[0];
    widgets.splice(dropIdx, 0, moved);
    widgets.forEach((w, i) => { w.position = i; });
    dragSrcIdx = null;
    renderGrid();
    loadAllWidgetData();
    debouncedSave();
  });

  return div;
}

function setPriorityChip(inputId, value) {
  const input = document.getElementById(inputId);
  if (input) input.value = value;
  const picker = document.getElementById(inputId + '-picker');
  if (picker) picker.querySelectorAll('.prio-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.prio === value)
  );
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function cancelEditMode() {

  const cancelBtn = document.getElementById('edit-cancel-btn');

async function fetchGreetings() {
  try {
    const { data, error } = await DB.from('greetings').select('text, time_window').eq('enabled', true);
    if (!error && data) greetingsCache = data;
  } catch(_) {}
}

function pickGreeting(h) {
  // Map hour to time_window
  let windows;
  if      (h <  5) windows = ['overnight'];
  else if (h <  8) windows = ['early_morning'];
  else if (h < 12) windows = ['morning'];
  else if (h < 14) windows = ['midday'];
  else if (h < 18) windows = ['afternoon'];
  else if (h < 21) windows = ['evening'];
  else             windows = ['night'];

  // Fallback hardcoded list if Supabase hasn't loaded
  const fallback = {
    overnight:     ['Burning the midnight oil', 'Night owl hours', 'Still at it?'],
    early_morning: ['Rise and shine', 'Good morning', 'Up early'],
    morning:       ['Good morning', 'Morning', 'Hope your coffee\'s strong'],
    midday:        ['Good afternoon', 'Midday check-in', 'Halfway through the day'],
    afternoon:     ['Good afternoon', 'Afternoon', 'Getting through the day'],
    evening:       ['Good evening', 'Hope you had a great day', 'Wind-down time'],
    night:         ['Good night', 'Winding down?', 'Getting late'],
    anytime:       ['Howdy, partner', 'Hey there', 'Welcome back', 'What\'s good?'],
  };

  let pool;
  if (greetingsCache) {
    pool = greetingsCache.filter(g => windows.includes(g.time_window) || g.time_window === 'anytime').map(g => g.text);
  } else {
    pool = [...(fallback[windows[0]] || []), ...fallback.anytime];
  }

  if (!pool.length) pool = ['Hello'];
  return pool[Math.floor(Math.random() * pool.length)];
}

function loadGreeting(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;
  const config = widget.config || {};
  const showTime  = config.show_time  !== false;
  const showDate  = config.show_date  !== false;
  const showSolar = config.show_solar !== false;
  const now = new Date();
  const h = now.getHours();
  const name = currentUser?.user_metadata?.display_name;
  const greeting = pickGreeting(h);
  const msg = name ? `${greeting}, ${name}.` : `${greeting}.`;
  const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  el.innerHTML = `
    ${showTime ? `<div class="greeting-time" data-clock="true">${timeStr}</div>` : ''}
    <div class="greeting-msg">${msg}</div>
    ${showDate ? `<div class="greeting-date">${dateStr}</div>` : ''}
    <div class="greeting-location" id="gl-${widget.id}"></div>
  `;

  // Populate location and solar arc async
  function appendSolar(lat, lng) {
    if (!(widget.size === 'large' && showSolar)) return;
    const solarDiv = document.createElement('div');
    solarDiv.className = 'greeting-solar';
    solarDiv.dataset.solarUpdate = widget.id;
    el.appendChild(solarDiv);
    const times = greetingSolarData[widget.id]
      || (lat !== null ? (getSunTimes(lat, lng) || getFallbackSunTimes()) : getFallbackSunTimes());
    greetingSolarData[widget.id] = times;
    renderSolarArc(solarDiv, times, new Date());
  }

  getGeoCoords()
    .then(({ lat, lng }) => {
      getLocationName(lat, lng).then(locName => {
        const locEl = document.getElementById(`gl-${widget.id}`);
        if (locEl && locName) locEl.textContent = locName;
      });
      appendSolar(lat, lng);
    })
    .catch(() => appendSolar(null, null));
}

function updateGreetingClocks() {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  document.querySelectorAll('[data-clock="true"]').forEach(el => { el.textContent = timeStr; });
  document.querySelectorAll('[data-solar-update]').forEach(solarEl => {
    const wid = solarEl.dataset.solarUpdate;
    const times = greetingSolarData[wid];
    if (times) renderSolarArc(solarEl, times, now);
  });
}

// ── SOLAR ARC ─────────────────────────────────────────────────────────────────

async function getGeoCoords() {
  try {
    const cached = JSON.parse(localStorage.getItem('vg-geo') || 'null');
    if (cached && Date.now() - cached.ts < 86400000)
      return { lat: cached.lat, lng: cached.lng };
  } catch(_) {}
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) { reject('unavailable'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        localStorage.setItem('vg-geo', JSON.stringify({ lat, lng, ts: Date.now() }));
        resolve({ lat, lng });
      },
      err => reject(err),
      { timeout: 6000, maximumAge: 86400000 }
    );
  });
}

// NOAA-based solar calculation (accurate to ~1 min, works worldwide)
function getSunTimes(lat, lng) {
  const now = new Date();
  // Day of year (1–366)
  const d = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  // Fractional year in radians
  const γ = (2 * Math.PI / 365) * (d - 1);
  // Equation of time (minutes)
  const eqtime = 229.18 * (0.000075 + 0.001868 * Math.cos(γ) - 0.032077 * Math.sin(γ)
    - 0.014615 * Math.cos(2 * γ) - 0.04089 * Math.sin(2 * γ));
  // Solar declination (radians)
  const decl = 0.006918 - 0.399912 * Math.cos(γ) + 0.070257 * Math.sin(γ)
    - 0.006758 * Math.cos(2 * γ) + 0.000907 * Math.sin(2 * γ)
    - 0.002697 * Math.cos(3 * γ) + 0.001480 * Math.sin(3 * γ);
  // Hour angle at sunrise/sunset (degrees, 90.833° accounts for refraction + solar disk)
  const latR = lat * Math.PI / 180;
  const cosHA = Math.cos(90.833 * Math.PI / 180) / (Math.cos(latR) * Math.cos(decl))
    - Math.tan(latR) * Math.tan(decl);
  if (Math.abs(cosHA) > 1) return null; // polar night or midnight sun
  const ha = Math.acos(cosHA) * 180 / Math.PI; // degrees
  // Solar noon in minutes from UTC midnight (lng: positive east, negative west)
  const solarNoonUTC = 720 - 4 * lng - eqtime;
  const utcMidnight = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  return {
    sunrise: new Date(utcMidnight + (solarNoonUTC - ha * 4) * 60000),
    sunset:  new Date(utcMidnight + (solarNoonUTC + ha * 4) * 60000),
    isFallback: false,
  };
}

function getFallbackSunTimes() {
  const d = new Date();
  return {
    sunrise: new Date(d.getFullYear(), d.getMonth(), d.getDate(), 6, 30),
    sunset:  new Date(d.getFullYear(), d.getMonth(), d.getDate(), 19, 30),
    isFallback: true,
  };
}

async function getLocationName(lat, lng) {
  try {
    const cached = JSON.parse(localStorage.getItem('vg-geo-name') || 'null');
    if (cached && Date.now() - cached.ts < 86400000) return cached.name;
  } catch(_) {}
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await res.json();
    const addr  = data.address || {};
    const city  = addr.city || addr.town || addr.village || addr.county || '';
    const state = addr.state || '';
    const name  = city && state ? `${city}, ${state}` : city || state || '';
    if (name) localStorage.setItem('vg-geo-name', JSON.stringify({ name, ts: Date.now() }));
    return name;
  } catch(_) { return ''; }
}

function getMoonPhase() {
  const JD = Date.now() / 86400000 + 2440587.5;
  // Known new moon: JD 2451550.1 (Jan 6, 2000 18:14 UTC)
  const age = ((JD - 2451550.1) % 29.530588 + 29.530588) % 29.530588;
  const phases = [
    { max:  1.85, emoji: '🌑', name: 'New Moon' },
    { max:  7.38, emoji: '🌒', name: 'Waxing Crescent' },
    { max:  9.22, emoji: '🌓', name: 'First Quarter' },
    { max: 14.77, emoji: '🌔', name: 'Waxing Gibbous' },
    { max: 16.62, emoji: '🌕', name: 'Full Moon' },
    { max: 22.15, emoji: '🌖', name: 'Waning Gibbous' },
    { max: 24.00, emoji: '🌗', name: 'Last Quarter' },
    { max: 29.53, emoji: '🌘', name: 'Waning Crescent' },
  ];
  return phases.find(p => age < p.max) || phases[phases.length - 1];
}

function renderSolarArc(el, times, now) {
  const { sunrise, sunset, isFallback } = times;
  const srMs = sunrise.getTime(), ssMs = sunset.getTime(), nowMs = now.getTime();
  const HOUR = 3600000;

  // Show moon phase: >1h after sunset, or >1h before sunrise
  const showMoon = (nowMs > ssMs + HOUR) || (nowMs < srMs - HOUR);

  const cs = getComputedStyle(document.documentElement);
  const accent  = cs.getPropertyValue('--accent').trim()     || '#E8D5B0';
  const border2 = cs.getPropertyValue('--border2').trim()    || '#3A3A38';
  const textMut = cs.getPropertyValue('--text-muted').trim() || '#888';

  if (showMoon) {
    const moon = getMoonPhase();
    const nextSr = nowMs < srMs ? sunrise : new Date(srMs + 86400000);
    const srTime = nextSr.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    el.innerHTML = `
      <div class="greeting-solar-night">
        <div class="greeting-solar-moon">${moon.emoji}</div>
        <div class="greeting-solar-phase">${moon.name}</div>
        <div class="greeting-solar-msg">↑ Sunrise ${srTime}</div>
      </div>`;
    return;
  }

  // Arc display (daytime + ±1h twilight windows)
  // SVG coordinate system: cx=200, cy=115, r=105
  // Arc spans leftX(95)→rightX(305), peak at y≈10
  const cx = 200, cy = 90, r = 105;
  const leftX = cx - r, rightX = cx + r;

  // Sun progress p: 0=sunrise, 1=sunset (can be slightly outside for twilight)
  const p = (nowMs - srMs) / (ssMs - srMs);
  const angle = (1 - p) * Math.PI; // π at sunrise (left), 0 at sunset (right)
  const sunX  = cx + r * Math.cos(angle);
  const sunY  = cy - r * Math.sin(angle);
  const sunAbove = (p >= 0 && p <= 1); // true when sun is above horizon

  // Filled arc from sunrise (leftX) to current sun position — large-arc-flag always 0
  let filledArcPath = '';
  if (sunAbove && p > 0.004) {
    const fp = Math.min(p, 0.9996);
    const fa = (1 - fp) * Math.PI;
    const fx = cx + r * Math.cos(fa);
    const fy = cy - r * Math.sin(fa);
    filledArcPath = `<path d="M ${leftX} ${cy} A ${r} ${r} 0 0 1 ${fx} ${fy}"
          fill="none" stroke="${accent}" stroke-width="2.5" opacity="0.55"/>`;
  }

  const fmt = d => d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  const srLabel = isFallback ? '' : fmt(sunrise);
  const ssLabel = isFallback ? '' : fmt(sunset);

  el.innerHTML = `
    <svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" overflow="visible" style="width:100%;display:block;">
      <defs>
        <filter id="sg" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Full background arc (sunrise → sunset) -->
      <path d="M ${leftX} ${cy} A ${r} ${r} 0 0 1 ${rightX} ${cy}"
            fill="none" stroke="${border2}" stroke-width="1.5"/>

      <!-- Filled arc (sunrise → now) -->
      ${filledArcPath}

      <!-- Horizon baseline -->
      <line x1="${leftX - 10}" y1="${cy}" x2="${rightX + 10}" y2="${cy}"
            stroke="${border2}" stroke-width="1" opacity="0.3"/>

      <!-- Sun dot -->
      <circle cx="${sunX}" cy="${sunY}" r="7"
              fill="${sunAbove ? accent : border2}"
              opacity="${sunAbove ? '1' : '0.45'}"
              ${sunAbove ? 'filter="url(#sg)"' : ''}/>

      <!-- ☀ sunrise icon (bottom-left base) -->
      <text x="${leftX}" y="${cy + 20}" font-size="15"
            fill="${textMut}" text-anchor="middle"
            font-family="Geist,sans-serif">☀</text>

      <!-- ☽ sunset icon (bottom-right base) -->
      <text x="${rightX}" y="${cy + 20}" font-size="15"
            fill="${textMut}" text-anchor="middle"
            font-family="Geist,sans-serif">☽</text>

      <!-- Sunrise time label -->
      ${srLabel ? `<text x="${leftX}" y="${cy + 34}" font-size="9.5"
            fill="${textMut}" text-anchor="middle"
            font-family="Geist,sans-serif">${srLabel}</text>` : ''}

      <!-- Sunset time label -->
      ${ssLabel ? `<text x="${rightX}" y="${cy + 34}" font-size="9.5"
            fill="${textMut}" text-anchor="middle"
            font-family="Geist,sans-serif">${ssLabel}</text>` : ''}
    </svg>`;
}

// TASKS TODAY ─────────────────────────────────────────────────────────────────
async function loadTasksToday(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;
  const config = widget.config || {};
  const limit = config.limit || 8;
  const listId = config.list_id || null;
  const priorityFilter = config.priority_filter || 'all';

  try {
    let q = DB.from('tasks').select('id, name, priority, done')
      .eq('due', todayStr).eq('done', false).order('position').limit(limit);
    if (listId) q = q.eq('category_id', listId);
    if (priorityFilter === 'high_medium') q = q.in('priority', ['high', 'medium']);
    else if (priorityFilter === 'high') q = q.eq('priority', 'high');
    const { data: tasks, error } = await q;

    if (error) throw error;

    if (!tasks || tasks.length === 0) {
      el.innerHTML = `
        <div class="widget-empty">
          <div class="widget-empty-icon">☑</div>
          <div class="widget-empty-text">No tasks due today</div>
        </div>
        <a href="tasks/index.html" class="widget-footer-link">Open Tasks →</a>
      `;
      return;
    }

    const pc = { high: 'var(--p-high)', medium: 'var(--p-medium)', low: 'var(--p-low)' };
    el.innerHTML = `
      <div class="mini-tasks-list">
        ${tasks.map(t => `
          <div class="task-row-mini">
            <div class="mini-priority-dot" style="background:${pc[t.priority] || 'var(--border2)'}"></div>
            <div class="mini-task-name">${esc(t.name)}</div>
          </div>
        `).join('')}
      </div>
      <a href="tasks/index.html" class="widget-footer-link">View all in Tasks →</a>
    `;
  } catch (e) {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-text">Could not load tasks</div></div>`;
  }
}

// HABIT CHECK-IN ──────────────────────────────────────────────────────────────
async function loadHabitCheckin(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;
  const config = widget.config || {};
  const limit = widget.size === 'large' ? (config.limit ?? 6) : 3;
  const habitIds = config.habit_ids || [];

  try {
    let hq = DB.from('habits').select('id, name, emoji, color').or('active.is.null,active.eq.true').order('created_at');
    if (habitIds.length) hq = hq.in('id', habitIds);
    if (limit > 0) hq = hq.limit(limit);
    const [{ data: habits, error: he }, { data: logs }] = await Promise.all([
      hq,
      DB.from('habit_logs').select('habit_id, completed').eq('date', todayStr),
    ]);

    if (he) throw he;

    if (!habits || habits.length === 0) {
      el.innerHTML = `
        <div class="widget-empty">
          <div class="widget-empty-icon">◉</div>
          <div class="widget-empty-text">No habits set up yet</div>
        </div>
        <a href="habits/index.html" class="widget-footer-link">Open Habits →</a>
      `;
      return;
    }

    const MUTED_RED = '#E07070';
    const logMap = {};
    (logs || []).forEach(l => { logMap[l.habit_id] = l.completed; });

    const todayLabel = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    el.innerHTML = `
      <div class="habit-checkin-header">
        <span class="habit-checkin-today">Today</span>
        <span class="habit-checkin-date">${todayLabel}</span>
      </div>
      <div style="flex:1;overflow:hidden;">
        ${habits.map(h => {
          const isYes  = logMap[h.id] === true;
          const isNo   = logMap[h.id] === false;
          const yStyle = isYes ? `background:#6BCB77;border-color:#6BCB77;color:#0f0f0f;` : '';
          const nStyle = isNo  ? `background:#FF6B6B;border-color:#FF6B6B;color:#0f0f0f;` : '';
          return `
            <div class="habit-row${isYes ? ' habit-done' : ''}">
              <div class="habit-row-left">
                <span class="habit-emoji">${h.emoji || '◎'}</span>
                <span class="habit-name">${esc(h.name)}</span>
              </div>
              <div class="habit-row-right">
                <div class="habit-yn-btns">
                  <button class="habit-yn-btn yn-yes" data-color="#6BCB77" style="${yStyle}"
                          onclick="toggleHabit('${h.id}',true,${isYes},this)">✓</button>
                  <button class="habit-yn-btn yn-no" style="${nStyle}"
                          onclick="toggleHabit('${h.id}',false,${isNo},this)">✗</button>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <a href="habits/index.html" class="widget-footer-link">Open Habits →</a>
    `;
  } catch (e) {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-text">Could not load habits</div></div>`;
  }
}

async function toggleHabit(habitId, completed, wasActive, btnEl) {
  const MUTED_RED  = '#FF6B6B';
  const btns       = btnEl.closest('.habit-yn-btns');
  const yesBtn     = btns.querySelector('.yn-yes');
  const noBtn      = btns.querySelector('.yn-no');
  const hColor     = yesBtn.dataset.color;
  const row        = btnEl.closest('.habit-row');

  function applyVisual(yesOn, noOn) {
    yesBtn.style.cssText = yesOn ? `background:${hColor};border-color:${hColor};color:#0f0f0f;` : '';
    noBtn.style.cssText  = noOn  ? `background:${MUTED_RED};border-color:${MUTED_RED};color:#0f0f0f;` : '';
    row.classList.toggle('habit-done', yesOn);
  }

  const prevYes = !!yesBtn.style.background;
  const prevNo  = !!noBtn.style.background;

  // Optimistic update
  if (wasActive) {
    applyVisual(false, false);
  } else {
    applyVisual(completed === true, completed === false);
  }

  try {
    const { data: existing } = await DB
      .from('habit_logs')
      .select('id')
      .eq('habit_id', habitId)
      .eq('date', todayStr)
      .maybeSingle();

    if (wasActive) {
      if (existing) await DB.from('habit_logs').delete().eq('id', existing.id);
    } else if (existing) {
      await DB.from('habit_logs').update({ completed, value: null }).eq('id', existing.id);
    } else {
      await DB.from('habit_logs').insert({
        id: crypto.randomUUID(),
        user_id: currentUser.id,
        habit_id: habitId,
        date: todayStr,
        completed,
        value: null,
      });
    }
  } catch (e) {
    applyVisual(prevYes, prevNo);
    console.error('Toggle habit error:', e);
  }
}

// UPCOMING EVENTS ─────────────────────────────────────────────────────────────
async function loadUpcomingEvents(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;
  const config = widget.config || {};
  const days       = config.days       || 7;
  const evLimit    = config.limit      || 8;
  const showTasks  = config.show_tasks !== false;
  const showGcal   = config.show_gcal  !== false;

  try {
    const now = new Date();
    const end = new Date();
    end.setDate(end.getDate() + days);
    const todayStr = now.toISOString().slice(0, 10);
    const endStr   = end.toISOString().slice(0, 10);

    // Fetch Motherboard events and (optionally) tasks in parallel
    const fetches = [
      DB.from('events')
        .select('id, title, date, time, all_day')
        .gte('date', todayStr)
        .lte('date', endStr)
        .order('date')
        .order('time', { nullsFirst: true }),
      showTasks
        ? DB.from('tasks').select('id, name, due').eq('done', false).gte('due', todayStr).lte('due', endStr).order('due')
        : Promise.resolve({ data: [] }),
    ];
    const [{ data: vEvents }, { data: tasksDue }] = await Promise.all(fetches);

    // Fetch Google Calendar events if connected and enabled
    let gcalItems = [];
    if (showGcal) try {
      const { data: tokenRow } = await DB
        .from('google_tokens')
        .select('access_token, expires_at')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if (tokenRow) {
        let token = tokenRow.access_token;
        if (new Date(tokenRow.expires_at).getTime() < Date.now() + 300000) {
          const { data: refreshed } = await DB.functions.invoke('refresh-google-token', {});
          if (refreshed?.access_token) token = refreshed.access_token;
        }
        const params = new URLSearchParams({
          singleEvents: 'true',
          orderBy:      'startTime',
          timeMin:      now.toISOString(),
          timeMax:      end.toISOString(),
          maxResults:   '20',
        });
        const resp = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/primary/events?${params}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (resp.ok) {
          const gData = await resp.json();
          gcalItems = (gData.items || []).map(item => {
            if (!item.start) return null;
            const isAllDay = !!item.start.date;
            const date = isAllDay ? item.start.date : item.start.dateTime?.slice(0, 10);
            const time = isAllDay ? null : item.start.dateTime?.slice(11, 16);
            return { title: item.summary || '(No title)', date, time, all_day: isAllDay, source: 'gcal' };
          }).filter(Boolean);
        }
      }
    } catch (_) { /* Google Calendar is optional — skip silently */ }

    // Merge all sources and sort by date then time
    const allItems = [
      ...(vEvents  || []).map(e => ({ ...e, source: 'event' })),
      ...(tasksDue || []).map(t => ({ title: t.name, date: t.due, time: null, all_day: true, source: 'task' })),
      ...gcalItems,
    ].sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      if (!a.time && !b.time) return 0;
      if (!a.time) return 1;
      if (!b.time) return -1;
      return a.time < b.time ? -1 : 1;
    }).slice(0, evLimit);

    if (!allItems.length) {
      el.innerHTML = `
        <div class="widget-empty">
          <div class="widget-empty-icon">◫</div>
          <div class="widget-empty-text">No upcoming events</div>
        </div>
        <a href="calendar/index.html" class="widget-footer-link">Open Calendar →</a>
      `;
      return;
    }

    el.innerHTML = `
      <div style="flex:1;overflow:hidden;">
        ${allItems.map(ev => {
          const [y, mo, dy] = ev.date.split('-').map(Number);
          const d = new Date(y, mo - 1, dy);
          let timeStr;
          if (ev.source === 'task') {
            timeStr = 'Due';
          } else if (ev.all_day || !ev.time) {
            timeStr = 'All day';
          } else {
            const [h, m] = ev.time.split(':').map(Number);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const hr12 = h % 12 || 12;
            timeStr = `${hr12}:${String(m).padStart(2,'0')} ${ampm}`;
          }
          const sourceLabel = ev.source === 'gcal' ? ' · Google' : '';
          return `
            <div class="event-row-mini">
              <div class="event-date-block">
                <div class="edb-day">${d.getDate()}</div>
                <div class="edb-mon">${d.toLocaleDateString('en-US', { month: 'short' })}</div>
              </div>
              <div class="event-info">
                <div class="event-name-mini">${esc(ev.title)}</div>
                <div class="event-time-mini">${timeStr}${sourceLabel}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <a href="calendar/index.html" class="widget-footer-link">Open Calendar →</a>
    `;
  } catch (e) {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-text">Could not load events</div></div>`;
  }
}

// HABIT STREAKS ───────────────────────────────────────────────────────────────
async function loadHabitStreaks(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;
  const config = widget.config || {};
  const limit = config.limit || 5;
  const habitIds = config.habit_ids || [];

  try {
    let hq = DB.from('habits').select('id, name, emoji').or('active.is.null,active.eq.true');
    if (habitIds.length) hq = hq.in('id', habitIds);
    const [{ data: habits, error: he }, { data: logs }] = await Promise.all([
      hq,
      DB.from('habit_logs')
        .select('habit_id, date, completed')
        .eq('completed', true)
        .order('date', { ascending: false })
        .limit(300),
    ]);

    if (he) throw he;

    if (!habits || habits.length === 0) {
      el.innerHTML = `
        <div class="widget-empty">
          <div class="widget-empty-icon">↑</div>
          <div class="widget-empty-text">No habits set up yet</div>
        </div>
      `;
      return;
    }

    const logsByHabit = {};
    (logs || []).forEach(l => {
      if (!logsByHabit[l.habit_id]) logsByHabit[l.habit_id] = new Set();
      logsByHabit[l.habit_id].add(l.date);
    });

    const habitsWithStreaks = habits.map(h => {
      const dates = logsByHabit[h.id] || new Set();
      let streak = 0;
      const cur = new Date();
      while (streak < 365) {
        const ds = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
        if (dates.has(ds)) { streak++; cur.setDate(cur.getDate() - 1); }
        else break;
      }
      return { ...h, streak };
    }).filter(h => h.streak > 0).sort((a, b) => b.streak - a.streak);

    if (habitsWithStreaks.length === 0) {
      el.innerHTML = `
        <div class="widget-empty">
          <div class="widget-empty-icon">↑</div>
          <div class="widget-empty-text">Check off habits to start building streaks</div>
        </div>
      `;
      return;
    }

    el.innerHTML = habitsWithStreaks.slice(0, limit).map(h => `
      <div class="streak-row">
        <span class="streak-emoji">${h.emoji || '◉'}</span>
        <span class="streak-name">${esc(h.name)}</span>
        <div>
          <div class="streak-count">${h.streak}</div>
          <div class="streak-unit">${h.streak === 1 ? 'day' : 'days'}</div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-text">Could not load streaks</div></div>`;
  }
}

// ── TAG DROPDOWN (mirrors tasks.js pattern, scoped per widget) ────────────────

function renderDashTagDropdown(wid) {
  const opts = document.getElementById(`tag-dropdown-options-${wid}`);
  if (!opts) return;
  const selected = dashSelectedTags[wid] || [];

  opts.innerHTML = dashTags.map(t => `
    <div class="tag-dropdown-option ${selected.includes(t.id) ? 'selected' : ''}"
         onclick="toggleDashTaskTag('${wid}','${t.id}')">
      <span class="option-dot" style="background:${t.color};"></span>
      <span style="color:${t.color};font-weight:500;">${esc(t.name)}</span>
      <span class="option-check">${selected.includes(t.id) ? '✓' : ''}</span>
    </div>`).join('');

  const sel = document.getElementById(`tag-dropdown-selected-${wid}`);
  if (!sel) return;
  if (selected.length) {
    sel.innerHTML = selected.map(tid => {
      const t = dashTags.find(x => x.id === tid);
      return t ? `<span class="tag-chip" style="background:${t.color}28;color:${t.color};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;">${esc(t.name)}</span>` : '';
    }).join('');
  } else {
    sel.innerHTML = `<span class="tag-dropdown-placeholder">Select tags...</span>`;
  }
}

function toggleDashTagDropdown(e, wid) {
  e.stopPropagation();
  dashTagOpen[wid] = !dashTagOpen[wid];
  document.getElementById(`tag-dropdown-trigger-${wid}`)?.classList.toggle('open', dashTagOpen[wid]);
  document.getElementById(`tag-dropdown-menu-${wid}`)?.classList.toggle('open', dashTagOpen[wid]);
  if (!dashTagOpen[wid]) hideDashInlineTagForm(wid);
}

function toggleDashTaskTag(wid, tid) {
  if (!dashSelectedTags[wid]) dashSelectedTags[wid] = [];
  if (dashSelectedTags[wid].includes(tid)) {
    dashSelectedTags[wid] = dashSelectedTags[wid].filter(x => x !== tid);
  } else {
    dashSelectedTags[wid].push(tid);
  }
  renderDashTagDropdown(wid);
}

function showDashInlineTagForm(wid) {
  dashInlineTagColor[wid] = TAG_COLORS[0];
  const nameEl = document.getElementById(`inline-tag-name-${wid}`);
  if (nameEl) { nameEl.value = ''; nameEl.style.borderColor = ''; }
  const sw = document.getElementById(`inline-tag-swatches-${wid}`);
  if (sw) sw.innerHTML = TAG_COLORS.map((c, i) => `
    <div class="tag-inline-swatch ${i === 0 ? 'selected' : ''}" style="background:${c}"
         onclick="selectDashInlineTagColor('${wid}','${c}',this)"></div>`).join('');
  document.getElementById(`tag-inline-form-${wid}`)?.classList.add('show');
  setTimeout(() => document.getElementById(`inline-tag-name-${wid}`)?.focus(), 80);
}

function hideDashInlineTagForm(wid) {
  document.getElementById(`tag-inline-form-${wid}`)?.classList.remove('show');
}

function selectDashInlineTagColor(wid, c, el) {
  dashInlineTagColor[wid] = c;
  document.querySelectorAll(`#inline-tag-swatches-${wid} .tag-inline-swatch`).forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

async function saveDashInlineTag(wid) {
  const nameEl = document.getElementById(`inline-tag-name-${wid}`);
  const name = nameEl?.value.trim();
  if (!name) { if (nameEl) nameEl.style.borderColor = 'var(--p-high)'; return; }
  if (nameEl) nameEl.style.borderColor = '';
  const newTag = { id: crypto.randomUUID(), name: name.toLowerCase(), color: dashInlineTagColor[wid] || TAG_COLORS[0] };
  dashTags.push(newTag);
  await DB.from('tags').insert({ ...newTag, user_id: currentUser.id });
  if (!dashSelectedTags[wid]) dashSelectedTags[wid] = [];
  dashSelectedTags[wid].push(newTag.id);
  hideDashInlineTagForm(wid);
  renderDashTagDropdown(wid);
}

async function fullAddTask(e, wid) {
  e.preventDefault();
  const nameEl = document.getElementById(`ft-name-${wid}`);
  const name = nameEl.value.trim();
  if (!name) return;

  const listId = document.getElementById(`ft-list-${wid}`)?.value || null;
  const dueDate = document.getElementById(`ft-due-${wid}`)?.value || null;
  const notes = document.getElementById(`ft-notes-${wid}`)?.value.trim() || null;
  const priority = document.getElementById(`ft-priority-${wid}`)?.value || 'medium';
  const tagIds = dashSelectedTags[wid] ? [...dashSelectedTags[wid]] : [];

  const task = {
    id: crypto.randomUUID(),
    user_id: currentUser.id,
    name,
    done: false,
    position: 0,
  };
  if (listId)        task.category_id = listId;
  if (dueDate)       task.due         = dueDate;
  if (notes)         task.notes       = notes;
  if (priority)      task.priority    = priority;
  if (tagIds.length) task.tags        = tagIds;

  try {
    const { error } = await DB.from('tasks').insert(task);
    if (error) { console.error('[fullAddTask] Supabase error:', error); throw error; }

    // Reset form fields
    nameEl.value = '';
    const listEl = document.getElementById(`ft-list-${wid}`);
    const dueEl  = document.getElementById(`ft-due-${wid}`);
    const notesEl = document.getElementById(`ft-notes-${wid}`);
    if (listEl)  listEl.value  = '';
    if (dueEl)   dueEl.value   = '';
    if (notesEl) notesEl.value = '';

    // Reset priority to medium (same default as the task modal)
    setPriorityChip(`ft-priority-${wid}`, 'medium');

    // Reset tags
    dashSelectedTags[wid] = [];
    renderDashTagDropdown(wid);

    const okEl = document.getElementById(`ft-ok-${wid}`);
    if (okEl) { okEl.classList.add('show'); setTimeout(() => okEl.classList.remove('show'), 2000); }
    nameEl.focus();
  } catch (err) {
    console.error('Full add task error:', err);
  }
}

// GOALS PROGRESS / NET WORTH ──────────────────────────────────────────────────
async function loadGoalsProgress(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;
  const config = widget.config || {};
  const displayCurrency = config.currency || 'USD';

  const FX = { USD:1, GBP:1.27, EUR:1.08, CAD:0.74, AUD:0.65, CHF:1.13, JPY:0.0067, CNY:0.14, HKD:0.13, SGD:0.75, BTC:85000, ETH:2000 };
  const CURRENCY_SYMBOLS = { USD:'$', GBP:'£', EUR:'€', AUD:'A$', CAD:'C$', CHF:'Fr', JPY:'¥', SGD:'S$' };
  const sym = CURRENCY_SYMBOLS[displayCurrency] || displayCurrency + ' ';

  try {
    const { data: assets } = await DB.from('assets').select('id,currency').eq('user_id', currentUser.id);
    if (!assets || !assets.length) {
      el.innerHTML = `
        <div class="goals-placeholder">
          <div class="goals-placeholder-icon">◈</div>
          <div class="goals-placeholder-label">No assets tracked yet</div>
        </div>
        <a href="finance/index.html" class="widget-footer-link">Open Finance →</a>
      `;
      return;
    }

    const { data: logs } = await DB.from('asset_logs').select('asset_id,value,logged_at').eq('user_id', currentUser.id).order('logged_at', { ascending: false });

    // Latest log per asset — convert to display currency via USD pivot
    const fxDisplay = FX[displayCurrency] || 1;
    let total = 0;
    for (const asset of assets) {
      const log = (logs || []).find(l => l.asset_id === asset.id);
      if (log) total += parseFloat(log.value) * (FX[asset.currency] || 1) / fxDisplay;
    }

    const fmt = v => {
      if (Math.abs(v) >= 1e6) return sym + (v / 1e6).toFixed(2) + 'M';
      if (Math.abs(v) >= 1e3) return sym + Math.round(v).toLocaleString();
      return sym + v.toFixed(2);
    };

    el.innerHTML = `
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px;">Net Worth</div>
      <div style="font-family:var(--font-serif);font-size:34px;font-weight:300;color:var(--accent);letter-spacing:-0.02em;line-height:1;">${esc(fmt(total))}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:6px;">${assets.length} asset${assets.length !== 1 ? 's' : ''} tracked</div>
      <a href="finance/index.html" class="widget-footer-link" style="margin-top:auto;">View Finance →</a>
    `;
  } catch(err) {
    el.innerHTML = `
      <div class="goals-placeholder">
        <div class="goals-placeholder-icon">◈</div>
        <div class="goals-placeholder-label">Finance</div>
      </div>
      <a href="finance/index.html" class="widget-footer-link">Open Finance →</a>
    `;
  }
}

async function loadMovieSuggest(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;
  const config = widget.config || {};

  const localToday = (() => { const _d = new Date(); return `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`; })();
  const salt = parseInt(localStorage.getItem(`vg-movie-${widget.id}-salt-${localToday}`) || '0');
  const cacheKey = `vg-movie-${widget.id}-${localToday}-${salt}`;
  const cached = localStorage.getItem(cacheKey);
  if (cached) { renderMovieWidget(el, JSON.parse(cached), widget.id); return; }

  try {
    const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
    const minRating = config.min_rating || 7;

    // Multi-select genres (OR logic)
    const genres = (config.genre_ids || []).filter(Boolean);
    const genreParam = genres.length ? `&with_genres=${genres.join('|')}` : '';

    // Multi-select decades — use combined range from earliest to latest
    const decades = (config.decades || []).filter(Boolean).map(Number).sort((a, b) => a - b);
    const decadeParam = decades.length
      ? `&primary_release_date.gte=${decades[0]}-01-01&primary_release_date.lte=${decades[decades.length - 1] + 9}-12-31`
      : '';

    const base = `${TMDB_PROXY}?sort_by=vote_average.desc&vote_count.gte=500&vote_average.gte=${minRating}${genreParam}${decadeParam}`;

    // Try a seeded page first; fall back to page 1 if it returns nothing
    let results = [];
    const seededPage = ((dayOfYear + salt) % 5) + 1;
    const r1 = await fetch(`${base}&page=${seededPage}`);
    if (r1.ok) results = (await r1.json()).results || [];
    if (!results.length) {
      const r2 = await fetch(`${base}&page=1`);
      if (r2.ok) results = (await r2.json()).results || [];
    }

    const movie = results[(dayOfYear + salt) % results.length];
    if (!movie) throw new Error('no results');

    localStorage.setItem(cacheKey, JSON.stringify(movie));
    renderMovieWidget(el, movie, widget.id);
  } catch (e) {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-text">Couldn't load suggestion</div></div>`;
  }
}

function renderMovieWidget(el, movie, widgetId) {
  const posterBase = 'https://image.tmdb.org/t/p/w300';
  const poster = movie.poster_path
    ? `<img class="movie-poster" src="${posterBase}${movie.poster_path}" alt="">`
    : `<div class="movie-poster-placeholder">▶</div>`;
  const year = (movie.release_date || '').slice(0, 4);
  const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '—';
  const blurb = movie.overview
    ? movie.overview.slice(0, 160) + (movie.overview.length > 160 ? '…' : '')
    : '';
  const lbUrl = movie.id ? `https://letterboxd.com/tmdb/${movie.id}/` : '#';

  el.innerHTML = `
    <div class="movie-wrap">
      <a class="movie-poster-col" href="${lbUrl}" target="_blank" rel="noopener" title="View on Letterboxd">${poster}</a>
      <div class="movie-info-col">
        <a class="movie-title" href="${lbUrl}" target="_blank" rel="noopener">${esc(movie.title)}</a>
        <div class="movie-meta">${esc(year)}&nbsp;&nbsp;★ ${esc(rating)}</div>
        <div class="movie-blurb">${esc(blurb)}</div>
        <button class="movie-refresh-btn" onclick="refreshMovieWidget('${widgetId}')">↻ New suggestion</button>
      </div>
    </div>
  `;
}

function refreshMovieWidget(widgetId) {
  closeWidgetOptions();
  const localToday = (() => { const _d = new Date(); return `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`; })();
  const saltKey = `vg-movie-${widgetId}-salt-${localToday}`;
  const newSalt = parseInt(localStorage.getItem(saltKey) || '0') + 1;
  localStorage.setItem(saltKey, newSalt);
  // clear old cache for today
  Object.keys(localStorage)
    .filter(k => k.startsWith(`vg-movie-${widgetId}-${localToday}`) && !k.includes('-salt-'))
    .forEach(k => localStorage.removeItem(k));
  const widget = widgets.find(w => w.id === widgetId);
  if (widget) loadMovieSuggest(widget);
}

// ON THIS DAY ──────────────────────────────────────────────────────────────────

async function loadHistoryToday(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;

  const cacheKey = `vg-history-${widget.id}-${todayStr}`;
  const cached = localStorage.getItem(cacheKey);
  if (cached) { renderHistoryWidget(el, JSON.parse(cached), widget.size); return; }

  try {
    const now = new Date();
    const month = now.getMonth() + 1;
    const day = now.getDate();
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${month}/${day}`);
    if (!res.ok) throw new Error('Wikipedia error');
    const data = await res.json();
    const events = (data.events || []).filter(e => e.text && e.year);
    if (!events.length) throw new Error('no events');
    localStorage.setItem(cacheKey, JSON.stringify(events));
    renderHistoryWidget(el, events, widget.size);
  } catch(e) {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-text">HISTORY_FEED: ERROR</div></div>`;
  }
}

function renderHistoryWidget(el, events, size) {
  const now = new Date();
  const year = now.getFullYear();
  const dayOfYear = Math.floor((now - new Date(year, 0, 0)) / 86400000);
  // Seed changes every year so the same date shows a different pick annually
  const seed = year * 1000 + dayOfYear;
  const pick = events[seed % events.length];
  const ago = year - pick.year;

  if (size === 'small') {
    // S1 — big year
    el.innerHTML = `
      <div class="hist-s1">
        <div class="hist-s1-year">${pick.year}</div>
        <div class="hist-s1-ago">// ${ago} YEARS AGO</div>
        <div class="hist-s1-text">${esc(pick.text)}</div>
      </div>`;

  } else if (size === 'wide') {
    // W1 — split panel
    el.innerHTML = `
      <div class="hist-w1">
        <div class="hist-w1-left">
          <div class="hist-w1-year">${pick.year}</div>
          <div class="hist-w1-ago">${ago}<br>YRS<br>AGO</div>
        </div>
        <div class="hist-w1-right">
          <div class="hist-w1-label">// ON THIS DAY IN HISTORY</div>
          <div class="hist-w1-text">${esc(pick.text)}</div>
        </div>
      </div>`;

  } else {
    // L2 — feature + secondary (large)
    const secondary = [1, 2, 3].map(i => events[(seed + i) % events.length]);
    const secRows = secondary.map(e => `
      <div class="hist-l2-sec-row">
        <div class="hist-l2-sec-year">${e.year}</div>
        <div class="hist-l2-sec-text">${esc(e.text)}</div>
      </div>`).join('');
    el.innerHTML = `
      <div class="hist-l2">
        <div class="hist-l2-hero">
          <div class="hist-l2-hero-label">// ON THIS DAY IN HISTORY</div>
          <div class="hist-l2-hero-year">${pick.year}</div>
          <div class="hist-l2-hero-text">${esc(pick.text)}</div>
        </div>
        <div class="hist-l2-divider">────────────────────────────────────</div>
        <div class="hist-l2-secondary">${secRows}</div>
      </div>`;
  }
}

// ── NEWS FEED ─────────────────────────────────────────────────────────────────

async function loadNewsFeed(widget) {
  const el = document.getElementById(`wb-${widget.id}`);
  if (!el) return;
  const config = widget.config || {};
  const rssUrl = config.source || 'https://feeds.bbci.co.uk/news/rss.xml';

  const now = new Date();
  const hourKey = now.toISOString().slice(0, 13); // YYYY-MM-DDTHH
  const cacheKey = `vg-news-${widget.id}-${hourKey}`;
  const cached = localStorage.getItem(cacheKey);
  if (cached) { renderNewsFeed(el, JSON.parse(cached), widget.size); return; }

  try {
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=10`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('rss error');
    const data = await res.json();
    const items = (data.items || []).filter(i => i.title && i.link);
    if (!items.length) throw new Error('no items');
    const feedTitle = data.feed?.title || '';
    const payload = { items, feedTitle };
    localStorage.setItem(cacheKey, JSON.stringify(payload));
    renderNewsFeed(el, payload, widget.size);
  } catch(e) {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-text">FEED_ERROR: COULD NOT LOAD</div></div>`;
  }
}

function newsRelTime(pubDate) {
  if (!pubDate) return '';
  const diff = Date.now() - new Date(pubDate).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 2)  return 'JUST NOW';
  if (mins < 60) return `${mins}M AGO`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}H AGO`;
  return `${Math.floor(hrs / 24)}D AGO`;
}

function renderNewsFeed(el, payload, size) {
  const { items, feedTitle } = payload;
  const src = feedTitle ? feedTitle.toUpperCase() : 'NEWS';

  if (size === 'small') {
    const top = items[0];
    el.innerHTML = `
      <div class="news-small">
        <div class="news-meta">${esc(src)} &middot; ${newsRelTime(top.pubDate)}</div>
        <a class="news-headline" href="${esc(top.link)}" target="_blank" rel="noopener noreferrer">${esc(top.title)}</a>
      </div>`;

  } else if (size === 'wide') {
    const top = items[0];
    const rest = items.slice(1, 4);
    el.innerHTML = `
      <div class="news-wide">
        <div class="news-wide-left">
          <div class="news-meta">${esc(src)} &middot; ${newsRelTime(top.pubDate)}</div>
          <a class="news-headline news-headline-lg" href="${esc(top.link)}" target="_blank" rel="noopener noreferrer">${esc(top.title)}</a>
        </div>
        <div class="news-wide-right">
          ${rest.map(item => `
            <div class="news-item">
              <div class="news-meta">${newsRelTime(item.pubDate)}</div>
              <a class="news-headline" href="${esc(item.link)}" target="_blank" rel="noopener noreferrer">${esc(item.title)}</a>
            </div>`).join('')}
        </div>
      </div>`;

  } else {
    // large
    const top = items[0];
    const rest = items.slice(1, 5);
    const desc = top.description
      ? top.description.replace(/<[^>]+>/g, '').slice(0, 160) + (top.description.length > 160 ? '…' : '')
      : '';
    el.innerHTML = `
      <div class="news-large">
        <div class="news-large-hero">
          <div class="news-meta">${esc(src)} &middot; ${newsRelTime(top.pubDate)}</div>
          <a class="news-headline news-headline-lg" href="${esc(top.link)}" target="_blank" rel="noopener noreferrer">${esc(top.title)}</a>
          ${desc ? `<div class="news-desc">${esc(desc)}</div>` : ''}
        </div>
        <div class="news-divider">────────────────────────────────────</div>
        <div class="news-large-list">
          ${rest.map(item => `
            <div class="news-item">
              <div class="news-meta">${newsRelTime(item.pubDate)}</div>
              <a class="news-headline" href="${esc(item.link)}" target="_blank" rel="noopener noreferrer">${esc(item.title)}</a>
            </div>`).join('')}
        </div>
      </div>`;
  }
}

function saveWidgetOptions() {
  const id = optionsWidgetId;
  if (!id) return;
  const widget = widgets.find(w => w.id === id);
  if (!widget) return;

  const type = widget.widget_type;
  const getVal  = elId => { const el = document.getElementById(elId); return el ? el.value : null; };
  const getOn   = elId => { const el = document.getElementById(elId); return el ? el.classList.contains('on') : true; };
  const getInt  = elId => { const v = getVal(elId); return v !== null ? parseInt(v, 10) : null; };
  const getHabits = () => {
    const el = document.getElementById('wo-habits');
    if (!el) return [];
    return Array.from(el.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
  };

  const sizeEl = document.getElementById('wo-size');
  if (sizeEl) widget.size = sizeEl.value;

  const newConfig = {};
  if (type === 'greeting') {
    newConfig.show_time  = getOn('wo-show-time');
    newConfig.show_date  = getOn('wo-show-date');
    newConfig.show_solar = getOn('wo-show-solar');
  } else if (type === 'tasks-today') {
    newConfig.limit = getInt('wo-limit') || 8;
    newConfig.list_id = getVal('wo-list') || null;
    newConfig.priority_filter = getVal('wo-priority') || 'all';
  } else if (type === 'habit-checkin') {
    newConfig.limit = getInt('wo-limit') ?? 6;
    newConfig.habit_ids = getHabits();
  } else if (type === 'upcoming-events') {
    newConfig.days = getInt('wo-days') || 7;
    newConfig.limit = getInt('wo-limit') || 8;
    newConfig.show_tasks = getOn('wo-show-tasks');
    newConfig.show_gcal  = getOn('wo-show-gcal');
  } else if (type === 'habit-streaks') {
    newConfig.limit = getInt('wo-limit') || 5;
    newConfig.habit_ids = getHabits();
  } else if (type === 'quick-task') {
    newConfig.default_list_id = getVal('wo-default-list') || null;
    newConfig.default_priority = getVal('wo-default-priority') || 'medium';
  } else if (type === 'journal-prompt') {
    newConfig.rotation = getVal('wo-rotation') || 'daily';
  } else if (type === 'goals-progress') {
    newConfig.currency = getVal('wo-currency') || 'USD';
  } else if (type === 'news-feed') {
    newConfig.source = getVal('wo-news-source') || 'https://feeds.bbci.co.uk/news/rss.xml';
    Object.keys(localStorage)
      .filter(k => k.startsWith(`vg-news-${id}`))
      .forEach(k => localStorage.removeItem(k));
  } else if (type === 'movie-suggest') {
    newConfig.genre_ids  = Array.from(document.querySelectorAll('[data-group="wo-genres"].selected')).map(b => b.dataset.val);
    newConfig.decades    = Array.from(document.querySelectorAll('[data-group="wo-decades"].selected')).map(b => b.dataset.val);
    newConfig.min_rating = parseFloat(getVal('wo-movie-rating')) || 7;
    Object.keys(localStorage)
      .filter(k => k.startsWith(`vg-movie-${id}`))
      .forEach(k => localStorage.removeItem(k));
  }

  widget.config = newConfig;
  closeWidgetOptions();
  debouncedSave();
  renderGrid();
  loadAllWidgetData();
}

// ── DASHBOARD SLOTS ───────────────────────────────────────────────────────────

async function loadSlots() {
  try {
    const { data, error } = await DB.from('dashboard_slots').select('*').order('slot_index');
    if (!error && data && data.length > 0) {
      dashboardSlots = data;
    } else {
      dashboardSlots = [{ slot_index: 0, name: 'Layout 1', widgets: [], updated_at: null, user_id: currentUser.id }];
    }
  } catch(e) {
    dashboardSlots = [{ slot_index: 0, name: 'Layout 1', widgets: [], updated_at: null, user_id: currentUser.id }];
  }
  // Validate activeSlotIndex — if stored slot no longer exists, use first
  if (!dashboardSlots.find(s => s.slot_index === activeSlotIndex)) {
    activeSlotIndex = dashboardSlots[0].slot_index;
    localStorage.setItem('vg-active-slot', String(activeSlotIndex));
  }
}

async function _persistSlot(slotIndex, widgetData) {
  const slot = dashboardSlots.find(s => s.slot_index === slotIndex);
  if (!slot) return;
  const widgetsJson = widgetData.map((w, i) => ({ ...w, position: i }));
  const now = new Date().toISOString();
  slot.widgets = widgetsJson;
  slot.updated_at = now;

  const upsertData = {
    user_id:    currentUser.id,
    slot_index: slotIndex,
    name:       slot.name,
    widgets:    widgetsJson,
    updated_at: now,
  };
  if (slot.id) upsertData.id = slot.id;

  try {
    const { data, error } = await DB.from('dashboard_slots')
      .upsert(upsertData, { onConflict: 'user_id,slot_index' })
      .select('id');
    if (error) {
      console.error('Slot save error:', error);
      showDashToast('Save failed: ' + error.message, true);
    } else {
      if (data?.[0]?.id && !slot.id) slot.id = data[0].id;
      showDashToast('Layout saved', false);
      renderSlotSidebar();
    }
  } catch(e) {
    console.error('Slot save exception:', e);
    showDashToast('Save failed: ' + e.message, true);
  }
}

function showDashToast(msg, isError) {
  let t = document.getElementById('dash-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'dash-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font-sans);font-size:12px;padding:8px 18px;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.2s;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.borderColor = isError ? '#E03030' : 'var(--border2)';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

async function activateSlot(index) {
  if (index === activeSlotIndex) return;
  clearTimeout(saveTimer);
  await _persistSlot(activeSlotIndex, widgets); // save current before switching
  const slot = dashboardSlots.find(s => s.slot_index === index);
  activeSlotIndex = index;
  localStorage.setItem('vg-active-slot', String(index));
  if (slot && Array.isArray(slot.widgets) && slot.widgets.length > 0) {
    widgets = slot.widgets.map(w => ({ ...w, user_id: currentUser.id }));
    widgets.forEach((w, i) => { w.position = i; });
  } else {
    widgets = [];
  }
  renderGrid();
  loadAllWidgetData();
  renderSlotSidebar();
}

function startRenameSlot(index) {
  const wrap = document.getElementById(`slot-name-wrap-${index}`);
  if (!wrap) return;
  const slot = dashboardSlots.find(s => s.slot_index === index);
  if (!slot) return;
  wrap.innerHTML = `
    <input class="slot-name-input" id="slot-name-input-${index}"
           value="${esc(slot.name)}" maxlength="20"
           onkeydown="if(event.key==='Enter'){this.blur();}if(event.key==='Escape'){renderSlotSidebar();}"
           onblur="saveSlotName(${index})">
  `;
  document.getElementById(`slot-name-input-${index}`)?.select();
}

async function saveSlotName(index) {
  const input = document.getElementById(`slot-name-input-${index}`);
  if (!input) return;
  const name = input.value.trim() || `Slot ${index + 1}`;
  const slot = dashboardSlots.find(s => s.slot_index === index);
  if (!slot) return;
  slot.name = name;
  renderSlotSidebar();
  try {
    await DB.from('dashboard_slots').upsert({
      user_id: currentUser.id,
      slot_index: index,
      name,
      widgets: slot.widgets || [],
    }, { onConflict: 'user_id,slot_index' });
  } catch(e) { console.error('Rename slot error:', e); }
}

async function addSlot() {
  if (dashboardSlots.length >= 6) { showDashToast('Maximum 6 layouts'); return; }
  const newIndex = Math.max(...dashboardSlots.map(s => s.slot_index)) + 1;
  const newSlot = {
    slot_index: newIndex,
    name: `Layout ${dashboardSlots.length + 1}`,
    widgets: [],
    updated_at: null,
    user_id: currentUser.id,
  };
  dashboardSlots.push(newSlot);
  renderSlotSidebar();
  try {
    const { data } = await DB.from('dashboard_slots').upsert({
      user_id: currentUser.id,
      slot_index: newIndex,
      name: newSlot.name,
      widgets: [],
    }, { onConflict: 'user_id,slot_index' }).select('id');
    if (data?.[0]?.id) newSlot.id = data[0].id;
  } catch(e) { console.error('addSlot error:', e); }
}

async function deleteSlot(index) {
  if (dashboardSlots.length <= 1) { showDashToast('Cannot delete the last layout'); return; }
  dashboardSlots = dashboardSlots.filter(s => s.slot_index !== index);
  if (activeSlotIndex === index) {
    const first = dashboardSlots[0];
    activeSlotIndex = first.slot_index;
    localStorage.setItem('vg-active-slot', String(activeSlotIndex));
    widgets = Array.isArray(first.widgets) && first.widgets.length
      ? first.widgets.map(w => ({ ...w, user_id: currentUser.id }))
      : [];
    widgets.forEach((w, i) => { w.position = i; });
    renderGrid();
    loadAllWidgetData();
  }
  renderSlotSidebar();
  try {
    await DB.from('dashboard_slots').delete()
      .eq('user_id', currentUser.id).eq('slot_index', index);
  } catch(e) { console.error('deleteSlot error:', e); }
}

function formatSlotDate(isoStr) {
  if (!isoStr) return '';
  return new Date(isoStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderSlotSidebar() {
  const list = document.getElementById('slot-list');
  if (!list) return;
  const canDelete = dashboardSlots.length > 1;
  list.innerHTML = dashboardSlots.map(slot => {
    const isActive = slot.slot_index === activeSlotIndex;
    const savedStr = slot.updated_at ? formatSlotDate(slot.updated_at) : null;
    const meta = isActive
      ? (savedStr ? `Last saved ${savedStr}` : 'Active')
      : (savedStr ? savedStr : 'Empty');
    return `
      <div class="slot-card${isActive ? ' active' : ''}"
           id="slot-card-${slot.slot_index}"
           onclick="${isActive ? '' : `activateSlot(${slot.slot_index})`}">
        <div class="slot-card-name-wrap" id="slot-name-wrap-${slot.slot_index}">
          <span class="slot-name">${esc(slot.name)}</span>
          <button class="slot-rename-btn" onclick="event.stopPropagation();startRenameSlot(${slot.slot_index})" title="Rename">✎</button>
          ${canDelete ? `<button class="slot-delete-btn" onclick="event.stopPropagation();deleteSlot(${slot.slot_index})" title="Delete">×</button>` : ''}
        </div>
        <div class="slot-card-meta">${meta}</div>
      </div>
    `;
  }).join('');

  // Add new layout button
  list.innerHTML += `
    <button class="slot-add-btn" onclick="addSlot()">＋ New layout</button>
  `;
}
