<html lang="en">

<div class="app">

<!-- SIDEBAR -->

    <h1>Calendar</h1>

  <div class="sidebar-section">Navigation</div>
  <div class="sidebar-item active">

  <a class="sidebar-add-list" href="../tasks/index.html" style="text-decoration:none;color:inherit;">

  <hr class="sidebar-divider">

</nav>

<!-- MAIN CONTENT -->
<main class="content">
  <div class="cal-topbar">
    <h2 class="cal-period-label" id="cal-period-label"></h2>
    <div class="cal-topbar-right">
      <div class="cal-view-switcher">
        <button class="cal-view-btn active" id="view-btn-month" onclick="switchView('month')">Month</button>
        <button class="cal-view-btn" id="view-btn-week" onclick="switchView('week')">Week</button>
        <button class="cal-view-btn" id="view-btn-day" onclick="switchView('day')">Day</button>
      </div>
      <div class="cal-nav-right">
        <button class="cal-nav-btn" onclick="prevPeriod()" title="Previous">‹</button>
        <button class="cal-nav-btn cal-today-btn" onclick="goToToday()">Today</button>
        <button class="cal-nav-btn" onclick="nextPeriod()" title="Next">›</button>
      </div>
    </div>
  </div>
  <div id="cal-grid"></div>
</main>
</div>

<!-- DAY PANEL (month view only) -->
<div class="day-panel-overlay" id="day-panel-overlay" onclick="closeDayPanel()"></div>
<div class="day-panel" id="day-panel">
  <div class="day-panel-header">
    <div>
      <div class="day-panel-date" id="day-panel-date"></div>
      <div class="day-panel-weekday" id="day-panel-weekday"></div>
    </div>
    <button class="day-panel-close" onclick="closeDayPanel()">✕</button>
  </div>
  <div class="day-panel-body" id="day-panel-body"></div>
  <div class="day-panel-footer">
    <button class="btn btn-primary" onclick="openNewEventFromPanel()" style="width:100%;justify-content:center;">+ Add Event</button>
  </div>

<!-- ── MODALS ── -->

<!-- EDIT TASK (same fields as tasks app) -->
<div class="modal-backdrop" id="task-modal">
  <div class="modal">
    <div class="modal-title">Edit Task</div>
    <input type="hidden" id="editing-task-id">
    <div class="form-group">
      <label>Task Name <span style="color:var(--p-high);">*</span></label>
      <input type="text" id="task-name-input" placeholder="What needs to be done?">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="task-category-input"></select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="task-priority-input">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="task-due-input">
      </div>
      <div class="form-group">
        <label>Tags</label>
        <div class="tag-dropdown-wrap" id="tag-dropdown-wrap">
          <div class="tag-dropdown-trigger" id="tag-dropdown-trigger" onclick="toggleTagDropdown(event)">
            <div class="tag-dropdown-selected" id="tag-dropdown-selected">

            <span class="tag-dropdown-arrow">▼</span>

<!-- ADD / EDIT EVENT -->

  <div class="modal">
    <div class="modal-title" id="event-modal-title">New Event</div>
    <input type="hidden" id="editing-event-id">
    <div class="form-group">
      <label>Title <span style="color:var(--p-high);">*</span></label>
      <input type="text" id="event-title-input" placeholder="Event title...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category <span style="color:var(--p-high);">*</span></label>
        <select id="event-category-input"></select>
      </div>
      <div class="form-group">
        <label>Date <span style="color:var(--p-high);">*</span></label>
        <input type="date" id="event-date-input">
      </div>
    </div>
    <!-- All Day Toggle -->
    <div class="form-group">
      <div class="toggle-row">
        <span class="toggle-label-text">All day</span>
        <label class="toggle-switch">
          <input type="checkbox" id="event-allday-input" checked onchange="toggleAllDay(this.checked)">

    <div id="event-time-fields" style="display:none;">

                 oninput="formatTimeInput(this)" class="time-hhmm-input">

      </div>

    <div class="form-group">
      <label>Repeat</label>

      <button class="btn btn-danger" id="event-delete-btn" style="display:none" onclick="confirmDeleteEvent()">Delete</button>

<!-- CONFIRM DELETE -->

  <div class="modal" style="max-width:380px;">
    <div class="modal-title" style="font-size:20px;">Are you sure?</div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal('confirm-delete-modal')">Cancel</button>
      <button class="btn" id="confirm-delete-btn" style="background:var(--p-high);color:white;border-color:var(--p-high);">Delete</button>
    </div>
  </div>
</div>

<script>
// ── SUPABASE ──
const _sb = window.supabaseClient;
let _uid = null;

// ── COLORS ──
const TAG_COLORS = [
  '#7B9EC4','#B87A8A','#C09A50','#5A9B80','#8C7EC0','#B87856',
  '#4E9BAC','#A87860','#A89060','#628E92','#9A5872','#6A9660',
];

// ── DATA ──
let tasks      = [];
let events     = [];
let categories = []; // DB table: lists
let tags       = [];

// ── CALENDAR VIEW STATE ──
// NOTE: Week start day is Sunday (0). Will be made user-configurable later.
const WEEK_START_DAY = 0;
const HOUR_HEIGHT    = 64; // px per hour in week/day view

let calView       = 'month';
let viewYear, viewMonth;         // month view
let viewWeekStart = null;        // Date object (Sunday), week view
let viewDay       = null;        // dateStr, day view
let activeDayStr  = null;        // open day panel (month view)

// ── TASK EDIT STATE ──
let selectedTaskTags = [];
let tagDropdownOpen  = false;

const today    = new Date();
const todayStr = today.toISOString().split('T')[0];

// ── GOOGLE CALENDAR ──
const GCAL_CLIENT_ID = '24557710513-s14v9scfguh13ke3p01nb46vcke2kbn4.apps.googleusercontent.com';
const GCAL_SCOPE     = 'https://www.googleapis.com/auth/calendar';
const GCAL_API       = 'https://www.googleapis.com/calendar/v3';
const GCAL_REDIRECT  = 'https://jmswd14.github.io/vanguard/calendar/index.html';
let googleConnected   = false;
let googleAccessToken = null;
let googleTokenExpiry = null;
let googleEvents      = [];

// ── UTILS ──
function uid()        { return crypto.randomUUID(); }
function getCategory(id) { return categories.find(c => c.id === id); }
function getTag(id)   { return tags.find(t => t.id === id); }

function capitalize(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }

function daysBetween(d1str, d2str) {
  return Math.round((new Date(d2str + 'T00:00:00') - new Date(d1str + 'T00:00:00')) / 86400000);
}

function fmtDate(year, month, day) {
  return new Date(year, month, day).toISOString().split('T')[0];
}

// ── TIME UTILS ──
// Convert 24h "HH:MM" or "HH:MM:SS" to { hhmm: "HH:MM", ampm: "AM"|"PM" }
function timeFromDb(timeStr) {
  if (!timeStr) return { hhmm: '', ampm: 'AM' };
  const parts = timeStr.split(':');
  let h = parseInt(parts[0]);
  const m = parts[1] || '00';
  const ampm = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return { hhmm: `${String(h).padStart(2, '0')}:${m}`, ampm };
}

// Convert { hhmm, ampm } to 24h "HH:MM" for DB, or null if invalid
function timeToDb(hhmm, ampm) {
  if (!hhmm || !hhmm.includes(':')) return null;
  const [hStr, mStr] = hhmm.split(':');
  let h = parseInt(hStr);
  const m = parseInt(mStr);
  if (isNaN(h) || isNaN(m)) return null;
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

// Format 24h time string "HH:MM" or "HH:MM:SS" to "12:30 PM"
function formatTime(timeStr) {
  if (!timeStr) return '';
  const { hhmm, ampm } = timeFromDb(timeStr);
  return `${hhmm} ${ampm}`;
}

// Auto-format HH:MM text input
function formatTimeInput(input) {
  let raw = input.value.replace(/[^0-9]/g, '').slice(0, 4);
  if (raw.length >= 3) {
    input.value = raw.slice(0, 2) + ':' + raw.slice(2);
  } else {
    input.value = raw;
  }
}

function toggleAllDay(isAllDay) {
  document.getElementById('event-time-fields').style.display = isAllDay ? 'none' : 'block';
}

// ── RECURRENCE ──
function eventOccursOn(ev, dateStr) {
  if (ev.date > dateStr) return false;
  if (ev.repeat === 'never')   return ev.date === dateStr;
  if (ev.repeat === 'daily')   return true;
  if (ev.repeat === 'weekly')  return daysBetween(ev.date, dateStr) % 7 === 0;
  if (ev.repeat === 'monthly') return ev.date.slice(8, 10) === dateStr.slice(8, 10);
  if (ev.repeat === 'yearly')  return ev.date.slice(5) === dateStr.slice(5);
  return false;
}

function getEventsForDay(dateStr) { return events.filter(e => eventOccursOn(e, dateStr)); }
function getTasksForDay(dateStr)  { return tasks.filter(t => !t.done && t.due === dateStr); }

// ── PERIOD LABEL ──
function getPeriodLabel() {
  if (calView === 'month') {
    return new Date(viewYear, viewMonth, 1)
      .toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }
  if (calView === 'week') {
    const end = new Date(viewWeekStart);
    end.setDate(end.getDate() + 6);
    const s = viewWeekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const e = end.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    return `${s} – ${e}`;
  }
  if (calView === 'day') {
    return new Date(viewDay + 'T00:00:00')
      .toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }
}

// ── VIEW SWITCHER ──
function switchView(view) {
  calView = view;
  ['month', 'week', 'day'].forEach(v => {
    document.getElementById('view-btn-' + v).classList.toggle('active', v === view);
  });
  if (view === 'week' && !viewWeekStart) {
    // Default to current week
    const d = new Date(today);
    d.setDate(d.getDate() - d.getDay()); // Sunday
    viewWeekStart = d;
  }
  if (view === 'day' && !viewDay) {
    viewDay = todayStr;
  }
  renderCalendar();
  if (googleConnected) fetchGoogleEvents().then(() => renderCalendar());
}

// ── NAVIGATION ──
function prevPeriod() {
  if (calView === 'month') {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  } else if (calView === 'week') {
    viewWeekStart = new Date(viewWeekStart);
    viewWeekStart.setDate(viewWeekStart.getDate() - 7);
  } else if (calView === 'day') {
    const d = new Date(viewDay + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    viewDay = d.toISOString().split('T')[0];
  }
  renderCalendar();
  if (googleConnected) fetchGoogleEvents().then(() => renderCalendar());
}

function nextPeriod() {
  if (calView === 'month') {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  } else if (calView === 'week') {
    viewWeekStart = new Date(viewWeekStart);
    viewWeekStart.setDate(viewWeekStart.getDate() + 7);
  } else if (calView === 'day') {
    const d = new Date(viewDay + 'T00:00:00');
    d.setDate(d.getDate() + 1);
    viewDay = d.toISOString().split('T')[0];
  }
  renderCalendar();
  if (googleConnected) fetchGoogleEvents().then(() => renderCalendar());
}

function goToToday() {
  if (calView === 'month') {
    viewMonth = today.getMonth();
    viewYear  = today.getFullYear();
  } else if (calView === 'week') {
    const d = new Date(today);
    d.setDate(d.getDate() - d.getDay());
    viewWeekStart = d;
  } else if (calView === 'day') {
    viewDay = todayStr;
  }
  renderCalendar();
  if (googleConnected) fetchGoogleEvents().then(() => renderCalendar());
}

// ── RENDER DISPATCH ──
function renderCalendar() {
  document.getElementById('cal-period-label').textContent = getPeriodLabel();
  if (calView === 'month')      renderMonthView();
  else if (calView === 'week')  renderWeekView();
  else if (calView === 'day')   renderDayView();
}

// ── MONTH VIEW ──
function renderMonthView() {
  const grid = document.getElementById('cal-grid');
  grid.className = 'cal-month-grid';

  const firstWeekday = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();
  const daysInPrevMo = new Date(viewYear, viewMonth, 0).getDate();

  const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  let html = DAY_NAMES.map(d => `<div class="cal-header-cell">${d}</div>`).join('');

  for (let i = firstWeekday - 1; i >= 0; i--) {
    html += renderMonthDayCell(fmtDate(viewYear, viewMonth - 1, daysInPrevMo - i), daysInPrevMo - i, true);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    html += renderMonthDayCell(fmtDate(viewYear, viewMonth, d), d, false);
  }
  const totalCells  = firstWeekday + daysInMonth;
  const trailingCnt = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= trailingCnt; d++) {
    html += renderMonthDayCell(fmtDate(viewYear, viewMonth + 1, d), d, true);
  }

  grid.innerHTML = html;
}

function renderMonthDayCell(dateStr, dayNum, otherMonth) {
  const isToday  = dateStr === todayStr;
  const isActive = dateStr === activeDayStr;

  const dayTasks        = getTasksForDay(dateStr);
  const dayEvents       = getEventsForDay(dateStr);
  const dayGoogleEvents = getGoogleEventsForDay(dateStr);

  const allItems = [
    ...dayTasks.map(t  => ({ type: 'task',  item: t })),
    ...dayEvents.map(e => ({ type: 'event', item: e })),
    ...dayGoogleEvents.map(e => ({ type: 'gcal', item: e })),
  ];
  const maxBars  = 3;
  const visible  = allItems.slice(0, maxBars);
  const overflow = allItems.length - maxBars;

  let barsHtml = visible.map(({ type, item }) => {
    if (type === 'task') {
      const cat   = getCategory(item.category);
      const color = cat ? cat.color : '#666666';
      const safe  = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return `<div class="cal-bar task-bar"
                   style="background:${color}22;border-left:3px solid ${color};"
                   onclick="event.stopPropagation();editTask('${item.id}')"
                   title="${safe}">
        <span class="cal-bar-dot" style="background:${color};"></span>
        <span class="cal-bar-text">${item.name}</span>
      </div>`;
    } else if (type === 'event') {
      const cat   = getCategory(item.category_id);
      const color = cat ? cat.color : 'var(--accent)';
      const safe  = item.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return `<div class="cal-bar event-bar"
                   style="background:${color}22;border-left:3px solid ${color};"
                   onclick="event.stopPropagation();openEditEvent('${item.id}')"
                   title="${safe}">
        <span class="cal-bar-dot" style="background:${color};"></span>
        <span class="cal-bar-text">${item.title}</span>
      </div>`;
    } else {
      const safe = item.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return `<div class="cal-bar gcal-bar" title="${safe}">
        <span class="cal-bar-dot" style="background:#4285F4;"></span>
        <span class="cal-bar-text">${item.title}</span>
        <span class="gcal-badge-inline">G</span>
      </div>`;
    }
  }).join('');

  if (overflow > 0) barsHtml += `<div class="cal-overflow">+${overflow} more</div>`;

  return `<div class="cal-day${otherMonth ? ' other-month' : ''}${isToday ? ' today' : ''}${isActive ? ' active' : ''}"
              onclick="openDayPanel('${dateStr}')">
    <div class="cal-day-number">${dayNum}</div>
    <div class="cal-day-bars">${barsHtml}</div>
  </div>`;
}

// ── WEEK VIEW ──
function renderWeekView() {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(viewWeekStart);
    d.setDate(d.getDate() + i);
    days.push(d.toISOString().split('T')[0]);
  }
  document.getElementById('cal-grid').className = '';
  document.getElementById('cal-grid').innerHTML = buildTimedView(days);
  scrollToCurrentHour();
}

// ── DAY VIEW ──
function renderDayView() {
  document.getElementById('cal-grid').className = '';
  document.getElementById('cal-grid').innerHTML = buildTimedView([viewDay]);
  scrollToCurrentHour();
}

function scrollToCurrentHour() {
  setTimeout(() => {
    const scroll = document.getElementById('cal-time-scroll');
    if (scroll) scroll.scrollTop = Math.max(0, (today.getHours() - 1) * HOUR_HEIGHT);
  }, 50);
}

// ── TIMED VIEW BUILDER (shared by week and day) ──
function buildTimedView(days) {
  const ncols = days.length;

  // ── Header row ──
  let headerHtml = `<div class="cal-gutter"></div>`;
  headerHtml += days.map(dateStr => {
    const d       = new Date(dateStr + 'T00:00:00');
    const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
    const dayNum  = d.getDate();
    const isToday = dateStr === todayStr;
    return `<div class="cal-col-header${isToday ? ' today' : ''}"
                 onclick="switchToDayView('${dateStr}')">
      <span class="col-header-name">${dayName}</span>
      <span class="col-header-num${isToday ? ' today' : ''}">${dayNum}</span>
    </div>`;
  }).join('');

  // ── All-day row ──
  let alldayHtml = `<div class="cal-gutter cal-allday-label">all day</div>`;
  alldayHtml += days.map(dateStr => {
    const dayTasks     = getTasksForDay(dateStr);
    const alldayEvents = getEventsForDay(dateStr).filter(e => e.all_day);

    const gcalAllDayItems = getGoogleEventsForDay(dateStr).filter(e => e.all_day);
    const items = [
      ...dayTasks.map(t => {
        const cat   = getCategory(t.category);
        const color = cat ? cat.color : '#666666';
        return `<div class="cal-allday-item" style="background:${color}22;border-left:2px solid ${color};"
                     onclick="editTask('${t.id}')" title="${t.name.replace(/"/g,'&quot;')}">${t.name}</div>`;
      }),
      ...alldayEvents.map(e => {
        const cat   = getCategory(e.category_id);
        const color = cat ? cat.color : 'var(--accent)';
        return `<div class="cal-allday-item" style="background:${color}22;border-left:2px solid ${color};"
                     onclick="openEditEvent('${e.id}')" title="${e.title.replace(/"/g,'&quot;')}">${e.title}</div>`;
      }),
      ...gcalAllDayItems.map(e => {
        return `<div class="cal-allday-item" style="background:#4285F422;border-left:2px solid #4285F4;"
                     title="${e.title.replace(/"/g,'&quot;')}">
          <span class="gcal-badge">G</span>${e.title}</div>`;
      }),
    ];
    return `<div class="cal-allday-col">${items.join('')}</div>`;
  }).join('');

  // ── Time axis ──
  const hours = Array.from({ length: 24 }, (_, i) => i);
  const timeAxisHtml = hours.map(h => {
    const label = h === 0 ? '12 AM' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h - 12} PM`;
    return `<div class="cal-time-label">${label}</div>`;
  }).join('');

  // ── Day columns ──
  const dayColsHtml = days.map(dateStr => {
    const isToday = dateStr === todayStr;

    // Hour grid lines + click slots
    const linesHtml = hours.map(h => {
      const h12  = h % 12 || 12;
      const ampm = h >= 12 ? 'PM' : 'AM';
      const hhmm = `${String(h12).padStart(2, '0')}:00`;
      return `<div class="cal-hour-slot" style="top:${h * HOUR_HEIGHT}px;height:${HOUR_HEIGHT}px;"
                   onclick="event.stopPropagation();openEventModal(null,'${dateStr}',false,'${hhmm}','${ampm}')">
        <div class="cal-hour-line"></div>
      </div>`;
    }).join('');

    // Timed events
    const timedEvents = getEventsForDay(dateStr).filter(e => !e.all_day && e.time);
    const eventsHtml  = timedEvents.map(e => {
      const [hr, mn] = e.time.split(':').map(Number);
      const topPx    = (hr + mn / 60) * HOUR_HEIGHT;
      const cat      = getCategory(e.category_id);
      const color    = cat ? cat.color : 'var(--accent)';
      return `<div class="cal-timed-event"
                   style="top:${topPx}px;height:${HOUR_HEIGHT - 4}px;background:${color}22;border-left:3px solid ${color};"
                   onclick="event.stopPropagation();openEditEvent('${e.id}')">
        <div class="cal-timed-title">${e.title}</div>
        <div class="cal-timed-time">${formatTime(e.time)}</div>
      </div>`;
    }).join('');

    const gcalTimedEvents = getGoogleEventsForDay(dateStr).filter(e => !e.all_day && e.time);
    const gcalEventsHtml  = gcalTimedEvents.map(e => {
      const [hr, mn] = e.time.split(':').map(Number);
      const topPx    = (hr + mn / 60) * HOUR_HEIGHT;
      return `<div class="cal-timed-event"
                   style="top:${topPx}px;height:${HOUR_HEIGHT - 4}px;background:#4285F422;border-left:3px solid #4285F4;left:36%;"
                   title="${e.title.replace(/"/g,'&quot;')}">
        <div class="cal-timed-title"><span class="gcal-badge">G</span> ${e.title}</div>
        <div class="cal-timed-time">${formatTime(e.time)}</div>
      </div>`;
    }).join('');

    return `<div class="cal-day-col${isToday ? ' today' : ''}">
      ${linesHtml}
      ${eventsHtml}
      ${gcalEventsHtml}
    </div>`;
  }).join('');

  const gridCols = `52px repeat(${ncols}, 1fr)`;

  return `<div class="cal-timed-view">
    <div class="cal-timed-header" style="grid-template-columns:${gridCols};">${headerHtml}</div>
    <div class="cal-allday-section" style="grid-template-columns:${gridCols};">${alldayHtml}</div>
    <div class="cal-time-scroll" id="cal-time-scroll">
      <div class="cal-time-inner" style="grid-template-columns:${gridCols};">
        <div class="cal-time-axis">${timeAxisHtml}</div>
        ${dayColsHtml}
      </div>
    </div>
  </div>`;
}

// ── DAY PANEL (month view) ──
function openDayPanel(dateStr) {
  if (calView !== 'month') return;
  activeDayStr = dateStr;
  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('day-panel-date').textContent =
    d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('day-panel-weekday').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long' });

  renderDayPanel();
  document.getElementById('day-panel').classList.add('open');
  document.getElementById('day-panel-overlay').classList.add('show');
  renderCalendar();
}

function closeDayPanel() {
  activeDayStr = null;
  document.getElementById('day-panel').classList.remove('open');
  document.getElementById('day-panel-overlay').classList.remove('show');
  if (calView === 'month') renderCalendar();
}

function renderDayPanel() {
  if (!activeDayStr) return;
  const dayTasks  = getTasksForDay(activeDayStr);
  const dayEvents = getEventsForDay(activeDayStr);
  const body      = document.getElementById('day-panel-body');
  let html = '';

  const dayGoogleEvents = getGoogleEventsForDay(activeDayStr);

  if (!dayTasks.length && !dayEvents.length && !dayGoogleEvents.length) {
    html = `<div class="day-panel-empty">
      <div class="day-panel-empty-icon">◌</div>
      <p>Nothing scheduled</p>
    </div>`;
  } else {
    if (dayTasks.length) {
      html += `<div class="day-panel-section-label">Tasks</div>`;
      html += dayTasks.map(t => {
        const cat   = getCategory(t.category);
        const color = cat ? cat.color : '#666666';
        return `<div class="day-panel-item" onclick="editTask('${t.id}')">
          <span class="day-panel-dot" style="background:${color};"></span>
          <div class="day-panel-item-body">
            <div class="day-panel-item-name">${t.name}</div>
            ${cat ? `<div class="day-panel-item-meta">${cat.name}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    if (dayEvents.length) {
      html += `<div class="day-panel-section-label"${dayTasks.length ? ' style="margin-top:20px;"' : ''}>Events</div>`;
      html += dayEvents.map(e => {
        const cat   = getCategory(e.category_id);
        const color = cat ? cat.color : 'var(--accent)';
        const meta  = [
          !e.all_day && e.time ? formatTime(e.time) : 'All day',
          e.repeat !== 'never' ? capitalize(e.repeat) : '',
        ].filter(Boolean).join(' · ');
        return `<div class="day-panel-item" onclick="openEditEvent('${e.id}')">
          <span class="day-panel-dot" style="background:${color};"></span>
          <div class="day-panel-item-body">
            <div class="day-panel-item-name">${e.title}</div>
            ${meta ? `<div class="day-panel-item-meta">${meta}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    if (dayGoogleEvents.length) {
      const hasOther = dayTasks.length || dayEvents.length;
      html += `<div class="day-panel-section-label"${hasOther ? ' style="margin-top:20px;"' : ''}>Google Calendar</div>`;
      html += dayGoogleEvents.map(e => {
        const meta = e.all_day ? 'All day' : formatTime(e.time);
        return `<div class="day-panel-item">
          <span class="day-panel-dot" style="background:#4285F4;"></span>
          <div class="day-panel-item-body">
            <div class="day-panel-item-name">${e.title} <span class="gcal-badge">G</span></div>
            <div class="day-panel-item-meta">${meta}</div>
          </div>
        </div>`;
      }).join('');
    }
  }

  body.innerHTML = html;
}

async function saveTask() {

  const category = document.getElementById('task-category-input').value;
  const priority = document.getElementById('task-priority-input').value;
  const due      = document.getElementById('task-due-input').value;
  const notes    = document.getElementById('task-notes-input').value.trim();

  renderCalendar();
  if (activeDayStr) renderDayPanel();

  await _sb.from('tasks').update({
    name, category_id: category || null, priority,

async function saveEvent() {
  const title      = document.getElementById('event-title-input').value.trim();
  const date       = document.getElementById('event-date-input').value;
  const categoryId = document.getElementById('event-category-input').value;
  const allDay     = document.getElementById('event-allday-input').checked;
  const repeat     = document.getElementById('event-repeat-input').value;
  const notes      = document.getElementById('event-notes-input').value.trim();
  const eid        = document.getElementById('editing-event-id').value;

  if (!title)      { document.getElementById('event-title-input').style.borderColor  = 'var(--p-high)'; return; }
  if (!date)       { document.getElementById('event-date-input').style.borderColor   = 'var(--p-high)'; return; }
  if (!categoryId) { document.getElementById('event-category-input').style.borderColor = 'var(--p-high)'; return; }

  let time = null;
  if (!allDay) {
    const hhmm = document.getElementById('event-time-hhmm').value;
    const ampm = document.getElementById('event-time-ampm').value;
    time = timeToDb(hhmm, ampm);
    if (!time) {
      document.getElementById('event-time-hhmm').style.borderColor = 'var(--p-high)';
      return;
    }
    document.getElementById('event-time-hhmm').style.borderColor = '';
  }

  const data = {
    title, date, all_day: allDay, time,
    repeat, notes: notes || null, category_id: categoryId || null,
  };

  closeModal('event-modal');

  if (eid) {
    const ev = events.find(x => x.id === eid);
    if (ev) Object.assign(ev, data);
    renderCalendar();
    if (activeDayStr) renderDayPanel();
    await _sb.from('events').update(data).eq('id', eid).eq('user_id', _uid);
    if (googleConnected) {
      const gcalBody = buildGcalEvent({ title, date, all_day: allDay, time });
      const ev2 = events.find(x => x.id === eid);
      if (ev2?.google_event_id) {
        await gcalFetch(`/calendars/primary/events/${ev2.google_event_id}`, {
          method: 'PUT',
          body: JSON.stringify(gcalBody),
        });
      } else {
        const gResult = await gcalFetch('/calendars/primary/events', {
          method: 'POST',
          body: JSON.stringify(gcalBody),
        });
        if (gResult?.id) {
          if (ev2) ev2.google_event_id = gResult.id;
          _sb.from('events').update({ google_event_id: gResult.id }).eq('id', eid).eq('user_id', _uid);
        }
      }
    }
  } else {
    const newId = uid();
    events.push({ id: newId, ...data });
    renderCalendar();
    if (activeDayStr) renderDayPanel();
    await _sb.from('events').insert({ id: newId, user_id: _uid, ...data });
    if (googleConnected) {
      const gcalBody = buildGcalEvent({ title, date, all_day: allDay, time });
      const gResult = await gcalFetch('/calendars/primary/events', {
        method: 'POST',
        body: JSON.stringify(gcalBody),
      });
      if (gResult?.id) {
        const ev = events.find(x => x.id === newId);
        if (ev) ev.google_event_id = gResult.id;
        _sb.from('events').update({ google_event_id: gResult.id }).eq('id', newId).eq('user_id', _uid);
      }
    }
  }
}

function confirmDeleteEvent() {
  const eid   = document.getElementById('editing-event-id').value;
  const title = document.getElementById('event-title-input').value.trim();
  closeModal('event-modal');
  document.getElementById('confirm-delete-msg').textContent = `The event "${title}" will be permanently deleted.`;
  document.getElementById('confirm-delete-btn').onclick = () => { closeModal('confirm-delete-modal'); deleteEvent(eid); };

async function deleteEvent(eid) {
  const ev = events.find(e => e.id === eid);
  const googleEventId = ev?.google_event_id;
  events = events.filter(e => e.id !== eid);
  renderCalendar();

  if (googleConnected && googleEventId) {
    await gcalFetch(`/calendars/primary/events/${googleEventId}`, { method: 'DELETE' });
  }
}

// ── GOOGLE CALENDAR FUNCTIONS ──
function connectGoogle() {
  const url = 'https://accounts.google.com/o/oauth2/v2/auth'
    + '?client_id='     + encodeURIComponent(GCAL_CLIENT_ID)
    + '&redirect_uri='  + encodeURIComponent(GCAL_REDIRECT)
    + '&response_type=code'
    + '&scope='         + encodeURIComponent(GCAL_SCOPE)
    + '&access_type=offline'
    + '&prompt=consent'
    + '&state=gcal_auth';
  window.location.href = url;
}

async function handleGcalCallback(code, session) {
  try {
    console.log('Calling google-oauth-exchange with code:', code.slice(0, 20) + '...');
    console.log('redirect_uri:', GCAL_REDIRECT);
    const currentSession = session;
    const { data, error } = await _sb.functions.invoke('google-oauth-exchange', {
      body: { code, redirect_uri: GCAL_REDIRECT },
      headers: currentSession ? { Authorization: `Bearer ${currentSession.access_token}` } : {},
    });
    console.log('Edge function response data:', JSON.stringify(data));
    console.log('Edge function response error:', JSON.stringify(error));
    if (error) throw error;
    if (data?.access_token) {
      googleAccessToken = data.access_token;
      googleTokenExpiry = Date.now() + (data.expires_in * 1000);
      googleConnected   = true;
      renderGcalSidebar();
    } else {
      console.error('No access_token in response:', JSON.stringify(data));
    }
  } catch (err) {
    console.error('Google auth failed:', err);
  }
}

async function loadGoogleTokens() {
  const { data } = await _sb.from('google_tokens')
    .select('access_token, expires_at')
    .eq('user_id', _uid)
    .single();
  if (!data) return;
  googleAccessToken = data.access_token;
  googleTokenExpiry = new Date(data.expires_at).getTime();
  googleConnected   = true;
  renderGcalSidebar();
}

async function getValidToken() {
  if (!googleConnected) return null;
  if (googleTokenExpiry && Date.now() < googleTokenExpiry - 60000) {
    return googleAccessToken;
  }
  return await refreshGcalToken();
}

async function refreshGcalToken() {
  try {
    const { data, error } = await _sb.functions.invoke('refresh-google-token', {});
    if (error) throw error;
    if (data?.access_token) {
      googleAccessToken = data.access_token;
      googleTokenExpiry = new Date(data.expires_at).getTime();
      return googleAccessToken;
    }
  } catch (err) {
    console.error('Token refresh failed:', err);
    googleConnected = false;
    renderGcalSidebar();
  }
  return null;
}

async function gcalFetch(path, options = {}) {
  const token = await getValidToken();
  if (!token) return null;
  const makeHeaders = (t) => ({
    'Authorization': `Bearer ${t}`,
    ...(options.body ? { 'Content-Type': 'application/json' } : {}),
    ...(options.headers || {}),
  });
  const resp = await fetch(`${GCAL_API}${path}`, { ...options, headers: makeHeaders(token) });
  if (resp.status === 204) return {};
  if (resp.status === 401) {
    const newToken = await refreshGcalToken();
    if (!newToken) return null;
    const retry = await fetch(`${GCAL_API}${path}`, { ...options, headers: makeHeaders(newToken) });
    return (retry.status === 204) ? {} : (retry.ok ? retry.json() : null);
  }
  return resp.ok ? resp.json() : null;
}

async function fetchGoogleEvents() {
  if (!googleConnected) return;
  let timeMin, timeMax;
  if (calView === 'month') {
    timeMin = new Date(viewYear, viewMonth, 1).toISOString();
    timeMax = new Date(viewYear, viewMonth + 1, 0, 23, 59, 59).toISOString();
  } else if (calView === 'week' && viewWeekStart) {
    timeMin = new Date(viewWeekStart).toISOString();
    const end = new Date(viewWeekStart);
    end.setDate(end.getDate() + 7);
    timeMax = end.toISOString();
  } else if (calView === 'day' && viewDay) {
    timeMin = new Date(viewDay + 'T00:00:00').toISOString();
    timeMax = new Date(viewDay + 'T23:59:59').toISOString();
  } else {
    return;
  }
  const params = new URLSearchParams({
    singleEvents: 'true',
    orderBy:      'startTime',
    timeMin, timeMax,
    maxResults:   '250',
  });
  const data = await gcalFetch(`/calendars/primary/events?${params}`);
  if (data?.items) {
    googleEvents = data.items.map(parseGoogleEvent).filter(Boolean);
  }
}

function parseGoogleEvent(item) {
  if (!item.start) return null;
  const isAllDay = Boolean(item.start.date);
  const dateStr  = isAllDay ? item.start.date : item.start.dateTime?.split('T')[0];
  const timeStr  = isAllDay ? null : item.start.dateTime?.split('T')[1]?.slice(0, 5);
  return {
    id:      item.id,
    title:   item.summary || '(No title)',
    date:    dateStr,
    all_day: isAllDay,
    time:    timeStr,
    google:  true,
  };
}

function getGoogleEventsForDay(dateStr) {
  return googleEvents.filter(e => e.date === dateStr);
}

function buildGcalEvent(ev) {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (ev.all_day) {
    return { summary: ev.title, start: { date: ev.date }, end: { date: ev.date } };
  }
  const startDT = `${ev.date}T${ev.time}:00`;
  const [h, m]  = ev.time.split(':').map(Number);
  const endH    = String((h + 1) % 24).padStart(2, '0');
  const endDT   = `${ev.date}T${endH}:${String(m).padStart(2, '0')}:00`;
  return {
    summary: ev.title,
    start: { dateTime: startDT, timeZone: tz },
    end:   { dateTime: endDT,   timeZone: tz },
  };
}

async function disconnectGoogle() {
  googleConnected   = false;
  googleAccessToken = null;
  googleTokenExpiry = null;
  googleEvents      = [];
  await _sb.from('google_tokens').delete().eq('user_id', _uid);
  renderGcalSidebar();
  renderCalendar();
}

function renderGcalSidebar() {
  const container = document.getElementById('gcal-sidebar');
  if (!container) return;
  if (googleConnected) {
    container.innerHTML = `
      <div class="gcal-connected-status">
        <span class="gcal-status-dot"></span> Connected
      </div>
      <button class="sidebar-gcal-btn sidebar-gcal-disconnect" onclick="disconnectGoogle()">Disconnect</button>
    `;
  } else {
    container.innerHTML = `<button class="sidebar-gcal-btn" onclick="connectGoogle()">Connect Google Calendar</button>`;
  }
}

// ── INIT ──
async function init() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) { window.location.href = '../login.html'; return; }
  _uid = session.user.id;

  viewMonth = today.getMonth();
  viewYear  = today.getFullYear();

  document.getElementById('sidebar-date-label').textContent =
    today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  // Handle Google OAuth callback — session is already confirmed above
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const gcalCode  = urlParams.get('code');
    const gcalState = urlParams.get('state');
    if (gcalCode && gcalState === 'gcal_auth') {
      window.history.replaceState({}, '', window.location.pathname);
      await handleGcalCallback(gcalCode, session);
    }
  } catch (err) {
    console.error('Google OAuth callback error:', err);
  }

  const [tr, lr, gr, er] = await Promise.all([
    _sb.from('tasks').select('id, name, list_id, category_id, priority, due, tags, notes, done').eq('user_id', _uid),
    _sb.from('lists').select('*').eq('user_id', _uid),
    _sb.from('tags').select('*').eq('user_id', _uid),
    _sb.from('events').select('*').eq('user_id', _uid),
  ]);

  tasks = (tr.data || []).map(t => ({
    id: t.id, name: t.name,
    // Support both old list_id and new category_id during transition
    category: t.category_id || t.list_id || '',
    priority: t.priority || 'medium', due: t.due || '',
    tags: t.tags || [], notes: t.notes || '', done: t.done || false,
  }));
  categories = lr.data || [];
  tags       = gr.data || [];
  events     = (er.data || []).map(e => ({
    ...e,
    all_day: e.all_day !== false, // default true if column not yet present
  }));

  // Load Google tokens (skip if just connected via OAuth callback)
  try {
    if (!googleConnected) await loadGoogleTokens();
    if (googleConnected) await fetchGoogleEvents();
  } catch (err) {
    console.error('Google Calendar load error:', err);
    googleConnected = false;
  }

  renderCalendar();
}

init();
</script>
