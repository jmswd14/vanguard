  <!-- ── MAIN CONTENT ── -->
  <main class="content">
    <div class="retro-page-brand">MOTHERBOARD</div>

    <div class="topbar">
      <div class="topbar-left">
        <h2>Notes</h2>
        <p id="notes-subheading">Loading…</p>
      </div>
    </div>

    <!-- Current note editor -->
    <div class="notes-editor-wrap">
      <div class="notes-editor-toolbar">
        <div class="notes-editor-meta">Page started <span id="note-started-date">—</span></div>
        <button class="notes-new-page-btn" onclick="newPage()">New Page →</button>
      </div>
      <textarea
        class="notes-textarea"
        id="notes-textarea"
        placeholder="Start writing…"
        spellcheck="false"
      ></textarea>
      <div class="notes-save-status" id="notes-save-status">—</div>
    </div>

    <!-- Archive -->
    <div class="notes-archive-header">
      <div class="notes-archive-title">Archive</div>
      <div class="notes-archive-count" id="archive-count"></div>
    </div>
    <div class="notes-archive-list" id="archive-list">
      <div class="notes-archive-empty">No archived pages yet.</div>
    </div>

  </main>
</div>

<!-- Confirm modal (delete archive note) -->
<div class="modal-backdrop" id="delete-note-backdrop" onclick="closeDeleteNote()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Delete Page</div>
    <p style="font-size:13px;color:var(--text-dim);margin:12px 0 20px;line-height:1.55;">Permanently delete this archived page? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeDeleteNote()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDeleteNote()">Delete</button>
    </div>
  </div>
</div>

<!-- Confirm modal (new page) -->
<div class="modal-backdrop" id="confirm-backdrop" onclick="closeConfirm()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">New Page</div>
    <p style="font-size:13px;color:var(--text-dim);margin:12px 0 20px;line-height:1.55;">Archive this page and start fresh?</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmNewPage()">Archive &amp; New Page</button>
    </div>
  </div>
</div>

<script>
const DB = window.supabaseClient;
let _uid = null;
let _activeNote = null; // { id, content, created_at }
let _saveTimer = null;
let _dirty = false;

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await DB.auth.getSession();
  if (!session) { window.location.href = '../login.html'; return; }
  _uid = session.user.id;
  await loadNote();
  updateSubheading();
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadNote() {
  const { data, error } = await DB
    .from('notes')
    .select('id, content, created_at')
    .eq('user_id', _uid)
    .is('archived_at', null)
    .order('created_at', { ascending: false })
    .limit(1)
    .maybeSingle();

  if (!error && data) {
    _activeNote = data;
  } else {
    // No active note — create one
    const { data: created } = await DB
      .from('notes')
      .insert({ user_id: _uid, content: '' })
      .select('id, content, created_at')
      .single();
    _activeNote = created;
  }

  const ta = document.getElementById('notes-textarea');
  ta.value = _activeNote?.content || '';
  document.getElementById('note-started-date').textContent = fmtDate(_activeNote?.created_at);
  setSaveStatus('saved');
  loadArchive();
}

// ── SAVE (debounced) ──────────────────────────────────────────────────────────
function onType() {
  _dirty = true;
  setSaveStatus('unsaved');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(save, 1200);
}

async function save() {
  if (!_activeNote || !_dirty) return;
  const content = document.getElementById('notes-textarea').value;
  const { error } = await DB
    .from('notes')
    .update({ content })
    .eq('id', _activeNote.id);
  if (!error) {
    _activeNote.content = content;
    _dirty = false;
    setSaveStatus('saved');
  } else {
    setSaveStatus('error saving');
  }
}

function setSaveStatus(msg) {
  const el = document.getElementById('notes-save-status');
  if (el) el.textContent = msg;
}

// ── NEW PAGE ──────────────────────────────────────────────────────────────────
function newPage() {
  // Always save current before prompting
  clearTimeout(_saveTimer);
  if (_dirty) save();
  // Only show confirm if there's actual content
  const content = document.getElementById('notes-textarea').value.trim();
  if (!content) {
    // blank page already — just reset created_at by re-creating
    confirmNewPage();
    return;
  }
  document.getElementById('confirm-backdrop').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-backdrop').classList.remove('show');
}

async function confirmNewPage() {
  closeConfirm();
  // Archive current note (set archived_at)
  if (_activeNote) {
    const content = document.getElementById('notes-textarea').value;
    await DB.from('notes').update({
      content,
      archived_at: new Date().toISOString()
    }).eq('id', _activeNote.id);
  }
  // Create new blank note
  const { data } = await DB
    .from('notes')
    .insert({ user_id: _uid, content: '' })
    .select('id, content, created_at')
    .single();
  _activeNote = data;
  _dirty = false;
  const ta = document.getElementById('notes-textarea');
  ta.value = '';
  ta.focus();
  document.getElementById('note-started-date').textContent = fmtDate(_activeNote?.created_at);
  setSaveStatus('saved');
  loadArchive();
}

// ── ARCHIVE ───────────────────────────────────────────────────────────────────
async function loadArchive() {
  const { data, error } = await DB
    .from('notes')
    .select('id, content, created_at, archived_at')
    .eq('user_id', _uid)
    .not('archived_at', 'is', null)
    .order('archived_at', { ascending: false });

  const list = document.getElementById('archive-list');
  const countEl = document.getElementById('archive-count');

  if (error || !data || data.length === 0) {
    list.innerHTML = '<div class="notes-archive-empty">No archived pages yet.</div>';
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `${data.length} page${data.length === 1 ? '' : 's'}`;
  list.innerHTML = data.map(n => {
    const preview = (n.content || '').replace(/\n/g, ' ').slice(0, 80) + ((n.content || '').length > 80 ? '…' : '');
    const full = esc(n.content || '');
    return `
      <div class="notes-archive-item" onclick="toggleArchiveItem(this)">
        <div class="notes-archive-item-header">
          <div class="notes-archive-date">${fmtDate(n.archived_at)}</div>
          <div class="notes-archive-preview">${esc(preview) || '<span style="opacity:0.4">Empty page</span>'}</div>
          <div class="notes-archive-chevron">›</div>
          <button class="notes-archive-delete-btn" onclick="event.stopPropagation(); promptDeleteNote('${n.id}')" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
        <div class="notes-archive-full">${full}</div>
      </div>
    `;
  }).join('');
}

function toggleArchiveItem(el) {
  el.classList.toggle('expanded');
}

let _deleteNoteId = null;
function promptDeleteNote(id) {
  _deleteNoteId = id;
  document.getElementById('delete-note-backdrop').classList.add('show');
}
function closeDeleteNote() {
  _deleteNoteId = null;
  document.getElementById('delete-note-backdrop').classList.remove('show');
}
async function confirmDeleteNote() {
  if (!_deleteNoteId) return;
  await DB.from('notes').delete().eq('id', _deleteNoteId);
  closeDeleteNote();
  loadArchive();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateSubheading() {
  const d = new Date();
  document.getElementById('notes-subheading').textContent =
    d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

// ── TEXTAREA EVENTS ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('notes-textarea');
  ta.addEventListener('input', onType);
  // Save on blur
  ta.addEventListener('blur', () => { if (_dirty) { clearTimeout(_saveTimer); save(); } });
});

// ── SIDEBAR COLLAPSE ──────────────────────────────────────────────────────────
function toggleLeftCollapse() {
  const app = document.getElementById('app');
  const btn = document.getElementById('ls-collapse-btn');
  const collapsed = app.classList.toggle('ls-collapsed');
  btn.textContent = collapsed ? '›' : '‹';
  localStorage.setItem('vg-ls-collapsed', collapsed ? '1' : '');
}
function openLeftMobile() {
  document.getElementById('left-sidebar').classList.add('mobile-open');
  document.getElementById('overlay').style.display = 'block';
}
function closeMobileMenus() {
  document.getElementById('left-sidebar').classList.remove('mobile-open');
  document.getElementById('overlay').style.display = 'none';
}
if (localStorage.getItem('vg-ls-collapsed')) {
  const app = document.getElementById('app');
  app.classList.add('ls-collapsed');
  const btn = document.getElementById('ls-collapse-btn');
  if (btn) btn.textContent = '›';
}

// ── NOTIFICATIONS (stub) ──────────────────────────────────────────────────────
function toggleNotifPanel() {}

// ── SIGN OUT ──────────────────────────────────────────────────────────────────
async function signOut() {
  await DB.auth.signOut();
  window.location.href = '../login.html';
}

init();
</script>
