<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Phosphor glow -->
    <filter id="glow-lg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-sm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="400" height="3" patternUnits="userSpaceOnUse">
      <rect width="400" height="1.5" fill="rgba(0,0,0,0.18)"/>
    </pattern>
    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#000000"/>

  <!-- Outer border frame -->
  <rect x="16" y="16" width="368" height="368" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.35" filter="url(#glow-sm)"/>
  <!-- Inner border frame -->
  <rect x="24" y="24" width="352" height="352" fill="none" stroke="#00FF41" stroke-width="0.5" opacity="0.15"/>

  <!-- Corner ticks -->
  <g fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.6" filter="url(#glow-sm)">
    <polyline points="16,36 16,16 36,16"/>
    <polyline points="364,16 384,16 384,36"/>
    <polyline points="384,364 384,384 364,384"/>
    <polyline points="36,384 16,384 16,364"/>
  </g>

  <!-- MB monogram -->
  <text
    x="200" y="230"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="144"
    font-weight="normal"
    fill="#00FF41"
    text-anchor="middle"
    letter-spacing="-4"
    filter="url(#glow-lg)">MB</text>

  <!-- Wordmark below -->
  <text
    x="200" y="284"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="13"
    fill="#00FF41"
    text-anchor="middle"
    letter-spacing="8"
    opacity="0.7"
    filter="url(#glow-sm)">MOTHERBOARD</text>

  <!-- Decorative line under wordmark -->
  <line x1="88" y1="296" x2="312" y2="296" stroke="#00FF41" stroke-width="0.5" opacity="0.3"/>

  <!-- Blinking cursor -->
  <rect x="270" y="210" width="14" height="5" fill="#00FF41" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0;0.9" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scanlines overlay -->
  <rect width="400" height="400" fill="url(#scanlines)"/>

  <!-- Vignette overlay -->
  <rect width="400" height="400" fill="url(#vignette)"/>
</svg>
